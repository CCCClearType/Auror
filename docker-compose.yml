services:
  frontend:
    image: snvfrgh/auror_frontend:latest
    container_name: auror_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - 80:80

  backend:
    image: snvfrgh/auror_backend:latest
    container_name: auror_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin
      DB_NAME: auror_vapor

  db:
    image: snvfrgh/auror_db:latest
    restart: always
    shm_size: 128mb
    container_name: auror_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: auror_vapor
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d auror_vapor"]
      interval: 5s
      timeout: 5s
      retries: 10
