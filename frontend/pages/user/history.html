<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>購買紀錄 — VaporAuror</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

    <header id="global-header"></header>

    <main class="history-container">
        <div class="history-header">
            <h1 class="title section-title" style="margin:0;">購買紀錄與狀態</h1>
        </div>
        <div class="library-list" id="history-list">
            <p style="color:var(--text-muted);text-align:center;padding:40px;">載入中...</p>
        </div>
    </main>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            if (!requireLogin()) return;
            await loadHistory();
        });

        async function loadHistory() {
            try {
                // GET /api/transactions
                const result = await apiGetTransactions();
                const list   = Array.isArray(result) ? result : (result.data || result.transactions || []);
                renderHistory(list);
            } catch (err) {
                document.getElementById('history-list').innerHTML =
                    `<p style="color:var(--accent-red);text-align:center;padding:40px;">載入失敗：${err.message}</p>`;
            }
        }

        function renderHistory(transactions) {
            const listEl = document.getElementById('history-list');
            listEl.innerHTML = '';

            if (transactions.length === 0) {
                listEl.innerHTML = `<div class="empty-state"><p>尚無交易紀錄</p></div>`;
                return;
            }

            transactions.forEach(tx => {
                const txItems = tx.Items || tx.items || [];
                const txId    = tx.transaction_id || tx.id;
                
                // Format Date: 2026-06-07 14:30:00
                const txDateStr = tx.transaction_date || tx.created_at || '';
                let dateStr = '';
                if (txDateStr) {
                    const d = new Date(txDateStr);
                    const pad = (n) => n.toString().padStart(2, '0');
                    dateStr = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
                }

                txItems.forEach(itemInfo => {
                    const item    = document.createElement('div');
                    item.className = 'library-item';

                    const itemId  = itemInfo.item_id || itemInfo.id;
                    const game    = itemInfo.Game || itemInfo.game || {};
                    const title   = game.title || game.Title || itemInfo.game_title || itemInfo.GameTitle || itemInfo.title || '未知遊戲';
                    const price   = Number(itemInfo.purchase_price || itemInfo.price || 0);
                    const refundStatus = itemInfo.refund_status || itemInfo.refundStatus || '';

                    let statusBadge;

                    if (refundStatus === 'PENDING') {
                        statusBadge = `<span class="status-badge status-pending" style="color:var(--accent-yellow);">退款審核中</span>`;
                    } else if (refundStatus === 'APPROVED') {
                        statusBadge = `<span class="status-badge status-refunded" style="color:var(--text-muted); border: 1px solid var(--border-color); background: transparent;">已退款</span>`;
                    } else {
                        // REJECTED or Empty (No refund request)
                        statusBadge = `<span class="status-badge status-completed" style="color:var(--accent-green); border: 1px solid var(--accent-green); background: transparent;">購買成功</span>`;
                    }

                    item.innerHTML = `
                        <div class="library-item-info">
                            <h3 style="color:white; font-size:1.2rem; margin-bottom:8px;">${escapeHtml(title)}</h3>
                            <p style="color:var(--text-secondary);font-size:14px;">
                                訂單：<span style="color:white;font-family:monospace;">#${txId}</span> &nbsp;|&nbsp; 
                                日期：${dateStr} &nbsp;|&nbsp; 
                                金額：<span style="color:var(--accent-pink);font-weight:bold;">NT$ ${price.toLocaleString()}</span> &nbsp;|&nbsp; 
                                ${statusBadge}
                            </p>
                        </div>
                    `;
                    listEl.appendChild(item);
                });
            });
        }

        async function requestRefund(transactionItemId) {
            const reason = prompt("確定要申請退款嗎？\n(注意：遊玩時間超過 2 小時可能無法退款)\n\n請填寫退款理由：");
            if (reason === null) return;
            if (reason.trim() === '') {
                showToast('退款理由不能為空！', 'error');
                return;
            }
            try {
                // POST /api/social/refunds { transaction_item_id, reason }
                await apiRequestRefund(transactionItemId, reason);
                showToast('退款申請已送出，請靜候客服人員處理。', 'success');
                await loadHistory();
            } catch (err) {
                showToast(`申請退款失敗：${err.message}`, 'error');
            }
        }
    </script>
</body>
</html>
