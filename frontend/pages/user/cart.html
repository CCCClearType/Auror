<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>購物車 — AurorNote</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

    <header id="global-header"></header>

    <main class="cart-container">
        <div class="cart-header">
            <h1 class="title section-title" style="margin:0;">購物車</h1>
        </div>
        
        <div class="library-list" id="cart-list">
            <p style="color:var(--text-muted);text-align:center;padding:40px;">載入中...</p>
        </div>

        <div class="cart-summary" id="cart-summary" style="display:none;">
            <div class="cart-summary-content">
                <div class="cart-summary-meta">
                    <h3 class="cart-summary-title">結帳總計</h3>
                    <div class="cart-total-price">NT$ <span id="total-price">0</span></div>
                    <p class="cart-wallet-balance">錢包餘額：無限</p>
                </div>
                <button class="button is-primary is-medium cart-checkout-btn" id="checkout-btn" onclick="checkout()">確認結帳</button>
            </div>
        </div>
    </main>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/main.js"></script>
    <script>
        let cartData = [];

        document.addEventListener("DOMContentLoaded", async () => {
            if (!requireLogin()) return;
            await loadCart();
        });

        async function loadCart() {
            try {
                // GET /api/cart
                const result = await apiGetCart();
                cartData = Array.isArray(result) ? result : (result.data || result.items || result.cart || []);
                renderCart();
            } catch (err) {
                document.getElementById('cart-list').innerHTML =
                    `<p style="color:var(--accent-red);text-align:center;padding:40px;">載入失敗：${err.message}</p>`;
            }
        }

        function renderCart() {
            const listEl    = document.getElementById('cart-list');
            const summaryEl = document.getElementById('cart-summary');
            listEl.innerHTML = '';

            if (cartData.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <p>購物車是空的，去商店挑選筆記吧！</p>
                         <a href="/" class="button is-light" style="margin-top:12px;">前往商店</a>
                    </div>`;
                summaryEl.style.display = 'none';
                return;
            }

            let total = 0;
            cartData.forEach(item => {
                const note  = item.note || item;
                const noteId = note.note_id || note.id || item.note_id;
                const title  = note.title || item.title || '';
                const price  = Number(note.price || item.price || 0);
                const coverUrl = getNoteCoverUrl(note);
                
                const isTakenDown = (note.status === 'TAKEN_DOWN' || item.status === 'TAKEN_DOWN');
                
                // If title is missing, it means the note was deleted from the store
                const displayTitle = title ? title : '已下架或失效的筆記';
                
                if (title && !isTakenDown) {
                    total += price;
                }

                const el = document.createElement('div');
                el.className = 'library-item';
                el.innerHTML = `
                    <a class="cart-item-cover" href="/pages/store/note_detail?id=${noteId}" aria-label="查看 ${escapeHtml(displayTitle)}">
                        ${coverUrl ? `<img src="${coverUrl}" alt="${escapeHtml(displayTitle)}">` : `<span>No image</span>`}
                    </a>
                    <div class="library-item-info">
                        <h3 style="color:${(title && !isTakenDown) ? 'white' : 'var(--text-muted)'}; font-size:1.2rem; margin-bottom:8px;">
                            <a href="/pages/store/note_detail?id=${noteId}" style="color:inherit;">${escapeHtml(displayTitle)}</a>
                            ${isTakenDown ? '<span class="tag is-danger is-light" style="margin-left:8px;">已下架</span>' : ''}
                        </h3>
                        ${isTakenDown ? `<p style="color:var(--accent-red);font-size:14px;">此商品已下架，請先從購物車移除才能結帳。</p>` : `<p style="color:var(--accent-pink);font-size:16px;font-weight:700;">NT$ ${price.toLocaleString()}</p>`}
                    </div>
                    <div class="library-item-actions">
                         <button class="button is-danger is-light" onclick="removeFromCart(${noteId})">移除</button>
                    </div>
                `;
                listEl.appendChild(el);
            });

            document.getElementById('total-price').textContent = total.toLocaleString();
            
            let hasTakenDown = false;
            cartData.forEach(item => {
                const note = item.note || item;
                if (note.status === 'TAKEN_DOWN' || item.status === 'TAKEN_DOWN') {
                    hasTakenDown = true;
                }
            });

            const checkoutBtn = document.getElementById('checkout-btn');
            if (hasTakenDown) {
                checkoutBtn.disabled = true;
                checkoutBtn.textContent = '包含已下架商品，無法結帳';
                checkoutBtn.classList.remove('is-primary');
            } else {
                checkoutBtn.disabled = false;
                checkoutBtn.textContent = '確認結帳';
                checkoutBtn.classList.add('is-primary');
            }

            summaryEl.style.display = 'block';
        }

        async function removeFromCart(noteId) {
            try {
                // DELETE /api/protected/cart/{note_id}
                await apiRemoveFromCart(noteId);
                showToast('移除成功！', 'success');
                await loadCart();
            } catch (err) {
                showToast(`移除失敗：${err.message}`, 'error');
            }
        }

        async function checkout() {
            const btn = document.getElementById('checkout-btn');
            btn.disabled = true;
            btn.textContent = '處理中...';
            try {
                // POST /api/protected/checkout
                await apiCheckout();
                showToast('結帳成功！筆記已加入你的個人筆記庫。', 'success');
                cartData = [];
                renderCart();
            } catch (err) {
                showToast(`結帳失敗：${err.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '確認結帳';
            }
        }
    </script>
</body>
</html>
