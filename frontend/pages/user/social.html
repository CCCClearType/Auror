<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社群中心 — AurorNote</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

    <header id="global-header"></header>

    <main>
        <div class="dashboard-header" style="margin-bottom:20px;">
            <h1 class="title">社群中心</h1>
            <button class="button is-primary" onclick="addFriendPrompt()">新增好友</button>
        </div>

        <div class="social-container">
            <div class="social-sidebar">
                <div class="sidebar-tabs">
                    <button id="tab-friends" class="active" onclick="switchTab('friends')">好友名單</button>
                    <button id="tab-requests" onclick="switchTab('requests')">好友邀請</button>
                    <button id="tab-blocked" onclick="switchTab('blocked')">黑名單</button>
                </div>
                <div class="list-container" id="social-list">
                    </div>
            </div>

            <div class="social-chat">
                <div class="chat-header" id="chat-header">請選擇一位好友開始聊天</div>
                <div class="chat-messages" id="chat-messages">
                    </div>
                <form class="chat-input-area" id="chat-form" style="display: none;">
                    <input class="input" type="text" id="chat-input" placeholder="輸入訊息..." autocomplete="off" required>
                    <button type="submit" class="button is-primary" style="width: 80px;">發送</button>
                </form>
            </div>
        </div>
    </main>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/main.js"></script>
    <script>
        let socialData = {
            friends: [],
            requests: [],
            blocked: []
        };

        let currentActiveTab = 'friends';
        let currentChatFriendId = null;
        let currentChatFriendName = '';
        let socialPollingInterval = null;

        document.addEventListener("DOMContentLoaded", async () => {
            if (!requireLogin()) return;
            await loadSocialData();

            socialPollingInterval = setInterval(async () => {
                await loadSocialData(true);
                if (currentChatFriendId) {
                    await renderChat(true);
                }
            }, 1000);
        });

        let socialDataStringified = '';
        // 載入好友、邀請與黑名單資料
        async function loadSocialData(isSilent = false) {
            try {
                let tempFriends = [], tempRequests = [], tempBlocked = [];
                const res = await apiGetFriends();
                
                // 相容於整合回傳或個別欄位
                if (res && !Array.isArray(res) && (res.friends || res.requests || res.blocked)) {
                    tempFriends = res.friends || [];
                    tempRequests = res.requests || [];
                    tempBlocked = res.blocked || [];
                } else {
                    tempFriends = Array.isArray(res) ? res : (res.data || []);
                    
                    // Fallback 取得邀請列表
                    try {
                        const reqs = await apiGetFriendRequests();
                        tempRequests = Array.isArray(reqs) ? reqs : (reqs.requests || reqs.data || []);
                    } catch (e) {
                        if (!isSilent) console.warn("使用 fallback 取得好友邀請失敗，預設為空列表", e);
                    }

                    // Fallback 取得黑名單列表
                    try {
                        const bl = await apiGetBlacklist();
                        tempBlocked = Array.isArray(bl) ? bl : (bl.blocked || bl.data || []);
                    } catch (e) {
                        if (!isSilent) console.warn("使用 fallback 取得黑名單失敗，預設為空列表", e);
                    }
                }
                
                const newDataObj = { friends: tempFriends, requests: tempRequests, blocked: tempBlocked };
                const newDataStr = JSON.stringify(newDataObj);
                
                if (newDataStr !== socialDataStringified) {
                    socialData = newDataObj;
                    socialDataStringified = newDataStr;
                    renderList();
                }
            } catch (err) {
                if (!isSilent) {
                    console.error("載入社群資料失敗：", err);
                    const listContainer = document.getElementById('social-list');
                    listContainer.innerHTML = `<p style="color:var(--accent-red); text-align:center; margin-top:20px;">載入失敗：${err.message}</p>`;
                }
            }
        }

        // 處理左側名單渲染
        function renderList() {
            const listContainer = document.getElementById('social-list');
            listContainer.innerHTML = '';

            let targetArray = socialData[currentActiveTab] || [];

            if (targetArray.length === 0) {
                const labels = { friends: '目前沒有好友', requests: '目前沒有好友邀請', blocked: '黑名單是空的' };
                listContainer.innerHTML = `<div class="social-empty">${labels[currentActiveTab] || '列表為空'}</div>`;
                return;
            }

            targetArray.forEach(item => {
                if (currentActiveTab === 'requests') {
                    const currentUser = getCurrentUser() || {};
                    if (item.sender_id === currentUser.id) {
                        user = item.receiver || { id: item.receiver_id, username: `買家 #${item.receiver_id}` };
                    } else {
                        user = item.sender || { id: item.sender_id, username: `買家 #${item.sender_id}` };
                    }
                } else {
                    user = item.sender || item.receiver || item.user || item;
                }
                const userId = user.id || item.blocked_id || item.user_id || item.friend_id || item.id;
                const username = user.username || item.username || `買家 #${userId}`;

                const div = document.createElement('div');
                div.className = 'list-item' + (currentActiveTab === 'blocked' ? ' blocked' : '') + (currentChatFriendId === userId ? ' active' : '');
                
                const avatarChar = username.charAt(0).toUpperCase();
                let lastMsgHtml = '';
                let avatarStyle = '';
                if (currentActiveTab === 'friends') {
                    if (item.last_message) {
                        lastMsgHtml = `<div style="font-size: 0.75rem; color: var(--text-subtle); max-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px;">${escapeHtml(item.last_message)}</div>`;
                    }
                    if (item.has_unread) {
                        avatarStyle = 'background-color: var(--accent-green) !important; color: #151b23 !important;';
                    }
                }

                let contentHtml = `
                    <div style="display:flex; align-items:center; width: 60%; overflow: hidden;">
                        <div class="list-item-avatar" style="${avatarStyle}">${avatarChar}</div>
                        <div style="display:flex; flex-direction:column; overflow:hidden;">
                            <span style="color: var(--text-primary); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${escapeHtml(username)}</span>
                            ${lastMsgHtml}
                        </div>
                    </div>
                `;
                let actionHtml = '';

                if (currentActiveTab === 'friends') {
                    div.onclick = () => openChat(userId, username);
                    actionHtml = `<button class="button is-danger is-light is-small" onclick="event.stopPropagation(); blockUser(${userId}, decodeURIComponent('${encodeURIComponent(username)}'))">封鎖</button>`;
                } 
                else if (currentActiveTab === 'requests') {
                    const requestId = item.friendship_id || item.id || userId;
                    const currentUser = getCurrentUser() || {};
                    const isOutgoing = item.sender_id === currentUser.id;

                    if (isOutgoing) {
                        actionHtml = `
                            <div style="display:flex; gap:6px;">
                                <button class="button is-warning is-light is-small" disabled style="opacity: 0.7;">待確認</button>
                                <button class="button is-danger is-light is-small" onclick="event.stopPropagation(); handleCancelRequest(${requestId})">收回</button>
                            </div>
                        `;
                    } else {
                        actionHtml = `
                            <div style="display:flex; gap:6px;">
                                <button class="button is-success is-light is-small" onclick="event.stopPropagation(); handleRequest(${requestId}, true)">接受</button>
                                <button class="button is-danger is-light is-small" onclick="event.stopPropagation(); handleRequest(${requestId}, false)">拒絕</button>
                            </div>
                        `;
                    }
                }  
                else if (currentActiveTab === 'blocked') {
                    actionHtml = `<button class="button is-light is-small" onclick="event.stopPropagation(); unblockUser(${userId})">解除封鎖</button>`;
                }

                div.innerHTML = contentHtml + actionHtml;
                listContainer.appendChild(div);
            });
        }

        // 切換頁籤
        function switchTab(tabName) {
            document.getElementById(`tab-${currentActiveTab}`).classList.remove('active');
            currentActiveTab = tabName;
            document.getElementById(`tab-${tabName}`).classList.add('active');
            renderList();
        }

        // 發送好友邀請
        async function addFriendPrompt() {
            const name = prompt("請輸入買家的 Username 來發送好友邀請：");
            if (!name) return;
            try {
                await apiFriendRequest(name);
                alert(`已向買家 [${name}] 發送好友邀請！`);
                await loadSocialData();
            } catch (err) {
                alert(`發送邀請失敗：${err.message}`);
            }
        }

        // 處理收到的邀請
        async function handleRequest(requestId, isAccepted) {
            try {
                if (isAccepted) {
                    await apiFriendAccept(requestId);
                    alert("已接受好友邀請！");
                } else {
                    await apiFriendDecline(requestId);
                    alert("已拒絕好友邀請。");
                }
                await loadSocialData();
            } catch (err) {
                alert(`操作失敗：${err.message}`);
            }
        }

        // 處理收回發出的邀請
        async function handleCancelRequest(requestId) {
            try {
                await apiFriendCancelRequest(requestId);
                alert("已成功收回好友邀請。");
                await loadSocialData();
            } catch (err) {
                alert(`操作失敗：${err.message}`);
            }
        }

        // 封鎖邏輯 (移出好友，加入黑名單)
        async function blockUser(userId, username) {
            if (confirm(`確定要封鎖 ${username} 嗎？他將無法再傳送訊息給你。`)) {
                try {
                    await apiAddBlacklist(userId);
                    alert(`已封鎖 ${username}`);
                    
                    if (currentChatFriendId === userId) {
                        closeChat();
                    }
                    await loadSocialData();
                } catch (err) {
                    alert(`封鎖失敗：${err.message}`);
                }
            }
        }

        // 關閉聊天視窗
        function closeChat() {
            currentChatFriendId = null;
            currentChatFriendName = '';
            document.getElementById('chat-header').innerText = "請選擇一位好友開始聊天";
            document.getElementById('chat-messages').innerHTML = '';
            document.getElementById('chat-form').style.display = 'none';
        }

        // 解除封鎖
        async function unblockUser(userId) {
            try {
                await apiRemoveBlacklist(userId);
                alert("已解除封鎖。");
                await loadSocialData();
            } catch (err) {
                alert(`解除封鎖失敗：${err.message}`);
            }
        }

        // 打開聊天視窗
        async function openChat(userId, friendName) {
            currentChatFriendId = userId;
            const isBlockedByMe = socialData.blocked && socialData.blocked.some(b => b.blocked_id === userId);

            const headerEl = document.getElementById('chat-header');
            const inputEl = document.getElementById('chat-input');
            const formEl = document.getElementById('chat-form');

            formEl.style.display = 'flex';
            if (isBlockedByMe) {
                headerEl.innerText = `與 ${friendName} 聊天中 (封鎖中)`;
                inputEl.disabled = true;
                inputEl.placeholder = "已封鎖此用戶，無法接收與傳送新訊息";
                await renderChat();
            } else {
                headerEl.innerText = `與 ${friendName} 聊天中`;
                inputEl.disabled = false;
                inputEl.placeholder = "輸入訊息...";
                
                await renderChat();
            }

            renderList();
            inputEl.focus();
        }

        // 渲染聊天訊息
        async function renderChat(isSilent = false) {
            if (!currentChatFriendId) return;
            const chatBox = document.getElementById('chat-messages');
            
            try {
                const res = await apiGetMessages(currentChatFriendId);
                const messages = Array.isArray(res) ? res : (res.data || res.messages || []);
                
                const isAtBottom = chatBox.scrollHeight - chatBox.clientHeight <= chatBox.scrollTop + 50;

                if (messages.length === 0) {
                    chatBox.innerHTML = '<p style="color:#8f98a0; text-align:center; margin-top:50px;">尚無聊天紀錄，打個招呼吧！</p>';
                    return;
                }

                const currentUser = getCurrentUser() || {};
                const currentUserId = currentUser.id;

                chatBox.innerHTML = '';
                messages.forEach(msg => {
                    const isMe = msg.sender === 'me' || 
                                 msg.sender_id === currentUserId || 
                                 (msg.sender && msg.sender.id === currentUserId);
                    
                    const text = msg.text || msg.content || '';
                    
                    const container = document.createElement('div');
                    container.style.display = 'flex';
                    container.style.flexDirection = 'column';
                    container.style.alignSelf = isMe ? 'flex-end' : 'flex-start';
                    container.style.maxWidth = 'min(70%, 560px)';

                    const div = document.createElement('div');
                    div.className = `message ${isMe ? 'msg-me' : 'msg-them'}`;
                    div.innerText = text;
                    container.appendChild(div);

                    if (isMe && msg.is_read) {
                        const readMark = document.createElement('div');
                        readMark.innerText = '已讀';
                        readMark.style.fontSize = '0.75rem';
                        readMark.style.color = 'var(--text-subtle)';
                        readMark.style.alignSelf = 'flex-end';
                        readMark.style.marginTop = '4px';
                        readMark.style.marginRight = '8px';
                        container.appendChild(readMark);
                    }

                    chatBox.appendChild(container);
                });

                if (!isSilent || isAtBottom) {
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            } catch (err) {
                console.error("載入聊天記錄失敗：", err);
                if (!isSilent) {
                    chatBox.innerHTML = `<p style="color:var(--accent-red); text-align:center; margin-top:50px;">載入聊天記錄失敗：${err.message}</p>`;
                }
            }
        }

        // 發送訊息
        document.getElementById('chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const text = input.value.trim();

            if (text && currentChatFriendId) {
                try {
                    await apiSendMessage(currentChatFriendId, text);
                    input.value = '';
                    await renderChat();
                } catch (err) {
                    alert(`發送訊息失敗：${err.message}`);
                }
            }
        });

        window.addEventListener('beforeunload', () => {
            if (socialPollingInterval) {
                clearInterval(socialPollingInterval);
            }
        });
    </script>
</body>
</html>
