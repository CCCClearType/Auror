<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人筆記庫 — AurorNote</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

    <header id="global-header"></header>

    <main class="library-container">
        <div class="library-header">
            <h1 class="title section-title" style="margin:0;">我的筆記庫</h1>
            <div class="select">
                <select id="sort-select" onchange="applySortAndRender()">
                    <option value="date-desc">取得時間：近到遠</option>
                    <option value="date-asc">取得時間：遠到近</option>
                    <option value="title-asc">筆記名稱：A - Z</option>
                    <option value="title-desc">筆記名稱：Z - A</option>
                </select>
            </div>
        </div>
        <div class="library-grid" id="my-notes-list">
            <p style="color:var(--text-muted);text-align:center;padding:40px; grid-column: 1 / -1;">載入中...</p>
        </div>
    </main>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/main.js"></script>
    <script>
        let allLibraryNotes = [];

        document.addEventListener("DOMContentLoaded", async () => {
            if (!requireLogin()) return;

            try {
                // GET /api/library
                const result = await apiGetLibrary();
                allLibraryNotes = Array.isArray(result) ? result : (result.data || result.notes || []);
                applySortAndRender();
            } catch (err) {
                document.getElementById('my-notes-list').innerHTML =
                    `<p style="color:var(--accent-red);text-align:center;padding:40px;">載入失敗：${err.message}</p>`;
            }
        });

        function applySortAndRender() {
            const sortVal = document.getElementById('sort-select') ? document.getElementById('sort-select').value : 'date-desc';
            let sortedNotes = [...allLibraryNotes];
            
            sortedNotes.sort((a, b) => {
                const noteA = a.note || a;
                const noteB = b.note || b;
                const titleA = (noteA.title || a.title || '').toLowerCase();
                const titleB = (noteB.title || b.title || '').toLowerCase();
                const dateA = new Date(a.acquired_date || 0).getTime();
                const dateB = new Date(b.acquired_date || 0).getTime();
                
                if (sortVal === 'date-desc') return dateB - dateA;
                if (sortVal === 'date-asc') return dateA - dateB;
                if (sortVal === 'title-asc') return titleA.localeCompare(titleB);
                if (sortVal === 'title-desc') return titleB.localeCompare(titleA);
                return 0;
            });
            
            renderLibrary(sortedNotes);
        }

        function renderLibrary(notes) {
            const listEl = document.getElementById('my-notes-list');
            listEl.innerHTML = '';

            // Filter out revoked/inactive licenses
            const activeNotes = notes.filter(item => item.status === 'ACTIVE' || !item.status);

            if (activeNotes.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <p>你的筆記庫空空如也，去商店逛逛吧！</p>
                        <a href="/" class="button is-primary" style="margin-top:12px;">前往商店</a>
                    </div>`;
                return;
            }

            activeNotes.forEach(item => {
                const note     = item.note || item;
                const noteId   = note.note_id || note.id || item.note_id;
                const title    = note.title || item.title || '';
                
                // Read from true database schema
                let acquiredDate = '未知日期';
                if (item.acquired_date) {
                    const d = new Date(item.acquired_date);
                    const pad = (n) => n.toString().padStart(2, '0');
                    acquiredDate = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
                }
                const status       = item.status || 'UNKNOWN';
                
                // Color formatting for status
                let statusColor = 'var(--text-muted)';
                if (status === 'ACTIVE') statusColor = 'var(--accent-green)';
                else if (status === 'REVOKED') statusColor = 'var(--accent-red)';
                else if (status === 'FROZEN') statusColor = 'var(--accent-yellow)';

                const el = document.createElement('div');
                el.className = 'lib-note-card';
                // Try to find a cover image if available (using placeholder if not)
                let coverImg = 'https://placehold.co/400x300/1a1a2e/00f0ff?text=No+Cover';
                const apiCover = getNoteCoverUrl(note);
                if (apiCover) coverImg = apiCover;

                el.innerHTML = `
                    <a class="lib-note-cover" href="/pages/store/note_detail?id=${noteId}" aria-label="查看 ${escapeHtml(title)}">
                        <img src="${coverImg}" alt="${escapeHtml(title)}" onerror="this.onerror=null; this.src='https://placehold.co/400x300/1a1a2e/00f0ff?text=No+Cover'">
                    </a>
                    <div class="lib-note-info">
                        <h3><a href="/pages/store/note_detail?id=${noteId}" style="color:inherit;">${escapeHtml(title)}</a></h3>
                        <div class="lib-note-meta" style="display:flex; justify-content:space-between; width:100%;">
                            <span>取得：${acquiredDate}</span>
                            <span style="color:${statusColor}; font-weight: bold;">${status}</span>
                        </div>
                    </div>
                    <div class="lib-note-actions">

                        <button class="button is-primary is-outlined btn-download" onclick="downloadNote(${noteId})">下載</button>
                        <button class="button is-info is-outlined btn-review" onclick="window.location.href='/pages/store/note_detail?id=${noteId}'">評價</button>
                    </div>
                `;
                listEl.appendChild(el);
            });
        }



        async function downloadNote(noteId) {
            try {
                // GET /api/protected/library/{note_id}/download
                const result = await authFetch(`/api/protected/library/${noteId}/download`);
                if (!result.ok) {
                    await parseResponse(result);
                }
                const blob = await result.blob();
                const disposition = result.headers.get('content-disposition') || '';
                const match = disposition.match(/filename="?([^";]+)"?/i);
                const filename = match ? match[1] : `note-${noteId}.download`;
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                link.remove();
                URL.revokeObjectURL(url);
                showToast('開始下載筆記...', 'success');
            } catch (err) {
                showToast(`下載失敗：${err.message}`, 'error');
            }
        }
    </script>
</body>
</html>
