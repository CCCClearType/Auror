<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人遊戲庫 — AurorVapor</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

    <header id="global-header"></header>

    <main class="library-container">
        <div class="library-header">
            <h1 class="title section-title" style="margin:0;">我的遊戲庫</h1>
        </div>
        <div class="library-grid" id="my-games-list">
            <p style="color:var(--text-muted);text-align:center;padding:40px; grid-column: 1 / -1;">載入中...</p>
        </div>
    </main>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            if (!requireLogin()) return;

            try {
                // GET /api/library
                const result = await apiGetLibrary();
                const games  = Array.isArray(result) ? result : (result.data || result.games || []);
                renderLibrary(games);
            } catch (err) {
                document.getElementById('my-games-list').innerHTML =
                    `<p style="color:var(--accent-red);text-align:center;padding:40px;">載入失敗：${err.message}</p>`;
            }
        });

        function renderLibrary(games) {
            const listEl = document.getElementById('my-games-list');
            listEl.innerHTML = '';

            // Filter out revoked/inactive licenses
            const activeGames = games.filter(item => item.status === 'ACTIVE' || !item.status);

            if (activeGames.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <p>你的遊戲庫空空如也，去商店逛逛吧！</p>
                        <a href="/" class="button is-primary" style="margin-top:12px;">前往商店</a>
                    </div>`;
                return;
            }

            activeGames.forEach(item => {
                const game     = item.game || item;
                const gameId   = game.game_id || game.id || item.game_id;
                const title    = game.title || item.title || '';
                
                // Read from true database schema
                const acquiredDate = (item.acquired_date || '').slice(0, 10) || '未知日期';
                const status       = item.status || 'UNKNOWN';
                
                // Color formatting for status
                let statusColor = 'var(--text-muted)';
                if (status === 'ACTIVE') statusColor = 'var(--accent-green)';
                else if (status === 'REVOKED') statusColor = 'var(--accent-red)';
                else if (status === 'FROZEN') statusColor = 'var(--accent-yellow)';

                const el = document.createElement('div');
                el.className = 'lib-game-card';
                // Try to find a cover image if available (using placeholder if not)
                let coverImg = 'https://placehold.co/400x300/1a1a2e/00f0ff?text=No+Cover';
                const apiCover = getGameCoverUrl(game);
                if (apiCover) coverImg = apiCover;

                el.innerHTML = `
                    <a class="lib-game-cover" href="/pages/store/game_detail?id=${gameId}" aria-label="查看 ${escapeHtml(title)}">
                        <img src="${coverImg}" alt="${escapeHtml(title)}" onerror="this.onerror=null; this.src='https://placehold.co/400x300/1a1a2e/00f0ff?text=No+Cover'">
                    </a>
                    <div class="lib-game-info">
                        <h3><a href="/pages/store/game_detail?id=${gameId}" style="color:inherit;">${escapeHtml(title)}</a></h3>
                        <div class="lib-game-meta" style="display:flex; justify-content:space-between; width:100%;">
                            <span>取得：${acquiredDate}</span>
                            <span style="color:${statusColor}; font-weight: bold;">${status}</span>
                        </div>
                    </div>
                    <div class="lib-game-actions">
                        <button class="button is-primary btn-play" onclick="playGame(${gameId})">啟動</button>
                        <button class="button is-light btn-download" onclick="downloadGame(${gameId})">下載</button>
                        <button class="button is-light btn-review" onclick="window.location.href='/pages/store/game_detail?id=${gameId}'">評價</button>
                    </div>
                `;
                listEl.appendChild(el);
            });
        }

        async function playGame(gameId) {
            try {
                // GET /api/protected/library/{game_id}/play
                const result = await authFetch(`/api/protected/library/${gameId}/play`);
                const data   = await result.json();
                // 後端可回傳遊戲啟動 URL 或 token
                if (data && data.launch_url) {
                    window.open(data.launch_url, '_blank');
                } else {
                    showToast('遊戲啟動中...', 'success');
                }
            } catch (err) {
                showToast(`啟動失敗：${err.message}`, 'error');
            }
        }

        async function downloadGame(gameId) {
            try {
                // GET /api/protected/library/{game_id}/download
                const result = await authFetch(`/api/protected/library/${gameId}/download`);
                if (!result.ok) {
                    await parseResponse(result);
                }
                const blob = await result.blob();
                const disposition = result.headers.get('content-disposition') || '';
                const match = disposition.match(/filename="?([^";]+)"?/i);
                const filename = match ? match[1] : `game-${gameId}.download`;
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                link.remove();
                URL.revokeObjectURL(url);
                showToast('開始下載遊戲...', 'success');
            } catch (err) {
                showToast(`下載失敗：${err.message}`, 'error');
            }
        }
    </script>
</body>
</html>
