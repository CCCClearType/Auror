<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>願望清單 — AurorNote</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

    <header id="global-header"></header>

    <main class="wishlist-container">
        <div class="wishlist-header">
            <h1 class="title section-title" style="margin:0;">願望清單</h1>
        </div>
        <div class="library-list" id="wishlist-container">
            <p style="color:var(--text-muted);text-align:center;padding:40px;">載入中...</p>
        </div>
    </main>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            if (!requireLogin()) return;
            await loadWishlist();
        });

        async function loadWishlist() {
            try {
                // GET /api/wishlist
                const result = await apiGetWishlist();
                const notes  = Array.isArray(result) ? result : (result.data || result.notes || []);
                
                let cartItems = [];
                try {
                    const cart = await apiGetCart();
                    cartItems = Array.isArray(cart) ? cart : (cart.data || cart.items || []);
                } catch (_) {}

                let libraryItems = [];
                try {
                    const library = await apiGetLibrary();
                    libraryItems = Array.isArray(library) ? library : (library.data || library.notes || []);
                } catch (_) {}

                renderWishlist(notes, cartItems, libraryItems);
            } catch (err) {
                document.getElementById('wishlist-container').innerHTML =
                    `<p style="color:var(--accent-red);text-align:center;padding:40px;">載入失敗：${err.message}</p>`;
            }
        }

        function renderWishlist(notes, cartItems, libraryItems = []) {
            const listEl = document.getElementById('wishlist-container');
            listEl.innerHTML = '';

            if (notes.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <p>願望清單空空如也，去商店尋找心儀的筆記吧！</p>
                        <a href="/" class="button is-primary" style="margin-top:12px;">前往商店</a>
                    </div>`;
                return;
            }

            notes.forEach(item => {
                const note    = item.note || item;
                const noteId  = note.note_id || note.id || item.note_id;
                const title   = note.title || item.title || '';
                const price   = Number(note.price || item.price || 0);
                const releaseDate = note.release_date || note.releaseDate || item.release_date || '未定';
                const coverUrl = getNoteCoverUrl(note);
                const coverHtml = coverUrl
                    ? `<img src="${escapeHtml(coverUrl)}" alt="${escapeHtml(title)} 封面" style="width:120px;height:68px;object-fit:cover;border-radius:8px;">`
                    : `<div style="width:120px;height:68px;border-radius:8px;background:var(--bg-lighter);display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:12px;">無圖片</div>`;

                const isCarted = cartItems.some(c => {
                    const cg = c.note || c;
                    const cId = cg.note_id || cg.id || c.note_id;
                    return Number(cId) === Number(noteId);
                });

                const isOwned = libraryItems.some(lib => {
                    const libNote = lib.note || lib;
                    const libId = libNote.note_id || libNote.id || lib.note_id;
                    return Number(libId) === Number(noteId) && (lib.status === 'ACTIVE' || !lib.status);
                });

                const isTakenDown = (note.status === 'TAKEN_DOWN' || item.status === 'TAKEN_DOWN');

                let cartBtnHtml = '';
                if (isTakenDown) {
                    cartBtnHtml = `<button class="button is-danger is-outlined" disabled style="background-color: transparent; border-color: var(--accent-red); color: var(--accent-red);">已下架</button>`;
                } else if (isOwned) {
                    cartBtnHtml = `<button class="button is-primary" disabled style="background-color: var(--bg-darker); color: var(--text-muted); border: 1px solid var(--border-color);">已在筆記庫</button>`;
                } else if (isCarted) {
                    cartBtnHtml = `<button class="button is-primary" disabled style="background-color: var(--bg-darker); color: var(--text-muted); border: 1px solid var(--border-color);">已在購物車</button>`;
                } else {
                    cartBtnHtml = `<button class="button is-primary" onclick="moveToCart(${noteId})">加入購物車</button>`;
                }

                const el = document.createElement('div');
                el.className = 'library-item';
                el.innerHTML = `
                    <a href="/pages/store/note_detail?id=${noteId}" style="display:block;flex:0 0 auto;">${coverHtml}</a>
                    <div class="library-item-info">
                        <a href="/pages/store/note_detail?id=${noteId}" style="color:white;text-decoration:none;">
                            <h3 style="color:${isTakenDown ? 'var(--text-muted)' : 'white'}; font-size:1.3rem; margin-bottom:8px;">
                                ${escapeHtml(title || '未命名筆記')}
                                ${isTakenDown ? '<span class="tag is-danger is-light" style="margin-left:8px;">已下架</span>' : ''}
                            </h3>
                        </a>
                        <p style="color:var(--text-secondary);font-size:14px;">
                            定價：<strong style="color:var(--accent-cyan);font-size:1.1rem;">NT$ ${price.toLocaleString()}</strong> &nbsp;|&nbsp; 
                            發售日：${releaseDate}
                        </p>
                    </div>
                    <div class="library-item-actions">
                        <a class="button is-light" href="/pages/store/note_detail?id=${noteId}">查看商店頁</a>
                        ${cartBtnHtml}
                        <button class="button is-light" onclick="removeWishlist(${noteId})">移除</button>
                    </div>
                `;
                listEl.appendChild(el);
            });
        }

        async function removeWishlist(noteId) {
            try {
                // DELETE /api/protected/wishlist/{note_id}
                await apiRemoveWishlist(noteId);
                showToast('已從願望清單移除！', 'success');
                await loadWishlist();
            } catch (err) {
                showToast(`移除失敗：${err.message}`, 'error');
            }
        }

        async function moveToCart(noteId) {
            try {
                // POST /api/protected/cart
                await apiAddToCart(noteId);
                showToast('已將筆記加入購物車！', 'success');
                await loadWishlist();
            } catch (err) {
                showToast(`操作失敗：${err.message}`, 'error');
            }
        }
    </script>
</body>
</html>
