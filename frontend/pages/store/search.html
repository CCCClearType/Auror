<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜尋結果 — AurorVapor</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

    <header id="global-header"></header>

    <main>
        <section class="section store-hero" style="margin-bottom: 30px; padding: 40px;">
            <form class="search-bar field has-addons" id="search-form">
                <div class="control is-expanded">
                    <input class="input is-medium" type="text" id="search-input" placeholder="搜尋遊戲名稱、類型、開發者...">
                </div>
                <div class="control">
                    <button type="submit" class="button is-primary is-medium">搜尋</button>
                </div>
            </form>
        </section>

        <div class="notification is-info is-light search-results-header" id="search-results-header"></div>
        <section class="box dashboard-panel" style="margin-bottom: 24px;">
            <div class="columns is-variable is-3 is-multiline">
                <div class="column is-3">
                    <label class="label" for="filter-tag">Tag</label>
                    <div class="select is-fullwidth"><select id="filter-tag"><option value="">全部 Tag</option></select></div>
                </div>
                <div class="column is-3">
                    <label class="label" for="filter-developer">開發者</label>
                    <input class="input" type="text" id="filter-developer" placeholder="開發者名稱">
                </div>
                <div class="column is-2">
                    <label class="label" for="filter-min-price">最低價</label>
                    <input class="input" type="number" id="filter-min-price" min="0" step="0.01">
                </div>
                <div class="column is-2">
                    <label class="label" for="filter-max-price">最高價</label>
                    <input class="input" type="number" id="filter-max-price" min="0" step="0.01">
                </div>
                <div class="column is-auto" id="hide-owned-wrapper" style="display: none; align-items: flex-end; justify-content: center; padding-bottom: 0.75rem;">
                    <div style="display: flex; flex-direction: column; gap: 0.5rem; align-items: center;">
                        <label class="label" style="margin: 0; color: transparent; user-select: none;">隱藏</label>
                        <div style="display: flex; align-items: center; gap: 0.6rem;">
                            <span class="has-text-grey-light is-size-7" style="font-weight: 700;">隱藏已購買</span>
                            <div class="vp-switch" id="filter-hide-owned">
                                <div class="vp-option vp-on"><span>ON</span></div>
                                <div class="vp-option vp-off"><span>OFF</span></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="column is-2">
                    <label class="label" for="filter-sort">排序</label>
                    <div class="select is-fullwidth"><select id="filter-sort">

                        <option value="price_asc">價格由低到高</option>
                        <option value="price_desc">價格由高到低</option>
                    </select></div>
                </div>
            </div>
            <div class="field is-grouped is-grouped-right">
                <p class="control"><a class="button is-light" href="/pages/store/search.html">清除</a></p>
                <p class="control"><button class="button is-primary" id="apply-filters-btn">套用搜尋</button></p>
            </div>
        </section>
        <h1 class="title section-title" id="search-section-title">搜尋結果</h1>
        <div class="game-list-container" id="game-list">
            <p class="has-text-centered p-6">載入中...</p>
        </div>
    </main>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const params  = new URLSearchParams(window.location.search);
            await loadTagOptions(params.get('tag') || '');
            document.getElementById('filter-developer').value = params.get('developer') || '';
            document.getElementById('filter-min-price').value = params.get('min_price') || '';
            document.getElementById('filter-max-price').value = params.get('max_price') || '';
            document.getElementById('filter-sort').value = params.get('sort') || 'price_asc';

            const hideOwnedWrapper = document.getElementById('hide-owned-wrapper');
            const hideOwnedToggle = document.getElementById('filter-hide-owned');
            if (localStorage.getItem('token')) {
                hideOwnedWrapper.style.display = 'flex';
                if (params.get('hide_owned') === 'true') {
                    hideOwnedToggle.classList.add('is-active');
                }
            }
            hideOwnedToggle.addEventListener('click', (e) => {
                hideOwnedToggle.classList.toggle('is-active');
                applySearchFilters(e);
            });

            document.getElementById('search-form').addEventListener('submit', applySearchFilters, true);
            document.getElementById('apply-filters-btn').addEventListener('click', applySearchFilters);

            await loadSearchGames();
        });

        async function loadSearchGames() {
            const params  = new URLSearchParams(window.location.search);
            const keyword = params.get('q') || '';
            const tag = params.get('tag') || '';

            document.getElementById('search-input').value = keyword;
            
            if (keyword) {
                document.title = `"${keyword}" 的搜尋結果 — AurorVapor`;
            } else if (tag) {
                document.title = `標籤「${tag}」的遊戲 — AurorVapor`;
            } else {
                document.title = '搜尋遊戲 — AurorVapor';
                document.getElementById('search-section-title').textContent = '瀏覽所有遊戲';
                document.getElementById('search-results-header').innerHTML = '';
            }

            // 顯示骨架屏
            renderGames(null);

            try {
                const result = await apiGetGames(Object.fromEntries(params.entries()));
                const games  = Array.isArray(result) ? result : (result.data || result.games || []);

                const headerEl = document.getElementById('search-results-header');
                const filters = [];
                if (keyword) filters.push(`關鍵字「${escapeHtml(keyword)}」`);
                if (params.get('tag')) filters.push(`Tag「${escapeHtml(params.get('tag'))}」`);
                if (params.get('developer')) filters.push(`開發者「${escapeHtml(params.get('developer'))}」`);
                if (params.get('min_price') || params.get('max_price')) filters.push(`價格 ${escapeHtml(params.get('min_price') || '0')} - ${escapeHtml(params.get('max_price') || '不限')}`);
                headerEl.innerHTML = filters.length ? `找到 <strong>${games.length}</strong> 個符合 ${filters.join('、')} 的結果` : '';
                document.getElementById('search-section-title').textContent = filters.length ? `搜尋結果 (${games.length})` : '瀏覽所有遊戲';

                renderGames(games);
            } catch (err) {
                document.getElementById('game-list').innerHTML =
                    `<p style="color:var(--accent-red);text-align:center;padding:40px;">搜尋失敗：${err.message}</p>`;
            }
        }

        async function loadTagOptions(selectedTag) {
            try {
                const result = await apiGetTags();
                const tags = Array.isArray(result) ? result : (result.data || []);
                const select = document.getElementById('filter-tag');
                tags.forEach(tag => {
                    const name = tag.tag_name || tag.name;
                    if (!name) return;
                    const option = document.createElement('option');
                    option.value = name;
                    option.textContent = name;
                    option.selected = name === selectedTag;
                    select.appendChild(option);
                });
            } catch (_) {}
        }

        function applySearchFilters(event) {
            event.preventDefault();
            event.stopImmediatePropagation();
            const params = new URLSearchParams();
            const keyword = document.getElementById('search-input').value.trim();
            const tag = document.getElementById('filter-tag').value;
            const developer = document.getElementById('filter-developer').value.trim();
            const minPrice = document.getElementById('filter-min-price').value;
            const maxPrice = document.getElementById('filter-max-price').value;
            const sort = document.getElementById('filter-sort').value;
            const hideOwnedToggle = document.getElementById('filter-hide-owned');
            if (keyword) params.set('q', keyword);
            if (tag) params.set('tag', tag);
            if (developer) params.set('developer', developer);
            if (minPrice !== '') params.set('min_price', minPrice);
            if (maxPrice !== '') params.set('max_price', maxPrice);
            if (sort) params.set('sort', sort);
            if (hideOwnedToggle && hideOwnedToggle.classList.contains('is-active')) {
                params.set('hide_owned', 'true');
            }
            window.location.href = `/pages/store/search.html${params.toString() ? '?' + params.toString() : ''}`;
        }
    </script>
</body>
</html>
