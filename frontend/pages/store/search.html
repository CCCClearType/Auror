<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜尋結果 — AurorNote</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

    <header id="global-header"></header>

    <main>
        <section class="section store-hero" style="margin-bottom: 30px; padding: 40px;">
            <form class="search-bar field has-addons" id="search-form">
                <div class="control is-expanded">
                    <input class="input is-medium" type="text" id="search-input" placeholder="搜尋筆記名稱、類型、賣家...">
                </div>
                <div class="control">
                    <button type="submit" class="button is-primary is-medium">搜尋</button>
                </div>
            </form>
        </section>

        <div class="notification is-info is-light search-results-header" id="search-results-header"></div>
        <section class="box dashboard-panel" style="margin-bottom: 24px;">
            <div class="columns is-variable is-3 is-multiline">
                <div class="column is-2">
                    <label class="label" for="filter-semester">學期</label>
                    <input class="input" type="text" id="filter-semester" list="list-semester" placeholder="全部學期" autocomplete="off">
                    <datalist id="list-semester"></datalist>
                </div>
                <div class="column is-3">
                    <label class="label" for="filter-department">開課系所</label>
                    <input class="input" type="text" id="filter-department" list="list-department" placeholder="全部系所" autocomplete="off">
                    <datalist id="list-department"></datalist>
                </div>
                <div class="column is-2">
                    <label class="label" for="filter-course-type">課程屬性</label>
                    <input class="input" type="text" id="filter-course-type" list="list-course-type" placeholder="全部屬性" autocomplete="off">
                    <datalist id="list-course-type"></datalist>
                </div>
                <div class="column is-3">
                    <label class="label" for="filter-subject">科目</label>
                    <input class="input" type="text" id="filter-subject" list="list-subject" placeholder="全部科目" autocomplete="off">
                    <datalist id="list-subject"></datalist>
                </div>
                <div class="column is-2">
                    <label class="label" for="filter-teacher">老師</label>
                    <input class="input" type="text" id="filter-teacher" list="list-teacher" placeholder="全部老師" autocomplete="off">
                    <datalist id="list-teacher"></datalist>
                </div>
                <div class="column is-2">
                    <label class="label" for="filter-tag">一般標籤</label>
                    <input class="input" type="text" id="filter-tag" list="list-tag" placeholder="全部標籤" autocomplete="off">
                    <datalist id="list-tag"></datalist>
                </div>
                <div class="column is-2">
                    <label class="label" for="filter-seller">賣家</label>
                    <input class="input" type="text" id="filter-seller" placeholder="賣家名稱">
                </div>
                <div class="column is-2">
                    <label class="label" for="filter-min-price">最低價</label>
                    <input class="input" type="number" id="filter-min-price" min="0" step="0.01">
                </div>
                <div class="column is-2">
                    <label class="label" for="filter-max-price">最高價</label>
                    <input class="input" type="number" id="filter-max-price" min="0" step="0.01">
                </div>
                <div class="column is-auto" id="hide-owned-wrapper" style="display: none; align-items: flex-end; justify-content: center; padding-bottom: 0.75rem;">
                    <div style="display: flex; flex-direction: column; gap: 0.5rem; align-items: center;">
                        <label class="label" style="margin: 0; color: transparent; user-select: none;">隱藏</label>
                        <div style="display: flex; align-items: center; gap: 0.6rem;">
                            <span class="has-text-grey-light is-size-7" style="font-weight: 700;">隱藏已購買</span>
                            <div class="vp-switch" id="filter-hide-owned">
                                <div class="vp-option vp-on"><span>ON</span></div>
                                <div class="vp-option vp-off"><span>OFF</span></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="column is-2">
                    <label class="label" for="filter-sort">排序</label>
                    <div class="select is-fullwidth"><select id="filter-sort">
                        <option value="price_asc">價格由低到高</option>
                        <option value="price_desc">價格由高到低</option>
                    </select></div>
                </div>
                <div class="column is-2">
                    <label class="label" for="filter-group">分群</label>
                    <div class="select is-fullwidth"><select id="filter-group">
                        <option value="">無</option>
                        <option value="SEMESTER">依照學期</option>
                        <option value="SUBJECT">依照科目</option>
                        <option value="DEPARTMENT">依照系所</option>
                        <option value="COURSE_TYPE">依照屬性</option>
                        <option value="TEACHER">依照老師</option>
                    </select></div>
                </div>
            </div>
            <div class="field is-grouped is-grouped-right">
                <p class="control"><a class="button is-light" href="/pages/store/search.html">清除</a></p>
                <p class="control"><button class="button is-primary" id="apply-filters-btn">套用搜尋</button></p>
            </div>
        </section>
        <h1 class="title section-title" id="search-section-title">搜尋結果</h1>
        <div class="note-list-container" id="note-list">
            <p class="has-text-centered p-6">載入中...</p>
        </div>
    </main>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const params  = new URLSearchParams(window.location.search);
            await loadTagOptions(params.get('semester') || '', params.get('subject') || '', params.get('teacher') || '', params.get('tag') || '', params.get('department') || '', params.get('course_type') || '');
            document.getElementById('filter-seller').value = params.get('seller') || '';
            document.getElementById('filter-min-price').value = params.get('min_price') || '';
            document.getElementById('filter-max-price').value = params.get('max_price') || '';
            document.getElementById('filter-sort').value = params.get('sort') || 'price_asc';
            document.getElementById('filter-group').value = params.get('group') || '';

            const hideOwnedWrapper = document.getElementById('hide-owned-wrapper');
            const hideOwnedToggle = document.getElementById('filter-hide-owned');
            if (localStorage.getItem('token')) {
                hideOwnedWrapper.style.display = 'flex';
                if (params.get('hide_owned') === 'true') {
                    hideOwnedToggle.classList.add('is-active');
                }
            }
            hideOwnedToggle.addEventListener('click', (e) => {
                hideOwnedToggle.classList.toggle('is-active');
                applySearchFilters(e);
            });

            document.getElementById('search-form').addEventListener('submit', applySearchFilters, true);
            document.getElementById('apply-filters-btn').addEventListener('click', applySearchFilters);

            await loadSearchNotes();
        });

        async function loadSearchNotes() {
            const params  = new URLSearchParams(window.location.search);
            const keyword = params.get('q') || '';
            const tag = params.get('tag') || '';
            const semester = params.get('semester') || '';
            const subject = params.get('subject') || '';
            const teacher = params.get('teacher') || '';
            const department = params.get('department') || '';
            const courseType = params.get('course_type') || '';

            document.getElementById('search-input').value = keyword;
            
            if (keyword) {
                document.title = `"${keyword}" 的搜尋結果 — AurorNote`;
            } else if (tag) {
                document.title = `科目「${tag}」的筆記 — AurorNote`;
            } else {
                document.title = '搜尋筆記 — AurorNote';
                document.getElementById('search-section-title').textContent = '瀏覽所有筆記';
                document.getElementById('search-results-header').innerHTML = '';
            }

            // 顯示骨架屏
            renderNotes(null);

            try {
                const result = await apiGetNotes(Object.fromEntries(params.entries()));
                const notes  = Array.isArray(result) ? result : (result.data || result.notes || []);

                const headerEl = document.getElementById('search-results-header');
                const filters = [];
                if (keyword) filters.push(`關鍵字「${escapeHtml(keyword)}」`);
                if (params.get('semester')) filters.push(`學期「${escapeHtml(params.get('semester'))}」`);
                if (params.get('department')) filters.push(`系所「${escapeHtml(params.get('department'))}」`);
                if (params.get('course_type')) filters.push(`屬性「${escapeHtml(params.get('course_type'))}」`);
                if (params.get('subject')) filters.push(`科目「${escapeHtml(params.get('subject'))}」`);
                if (params.get('teacher')) filters.push(`老師「${escapeHtml(params.get('teacher'))}」`);
                if (params.get('tag')) filters.push(`標籤「${escapeHtml(params.get('tag'))}」`);
                if (params.get('seller')) filters.push(`賣家「${escapeHtml(params.get('seller'))}」`);
                if (params.get('min_price') || params.get('max_price')) filters.push(`價格 ${escapeHtml(params.get('min_price') || '0')} - ${escapeHtml(params.get('max_price') || '不限')}`);
                headerEl.innerHTML = filters.length ? `找到 <strong>${notes.length}</strong> 個符合 ${filters.join('、')} 的結果` : '';
                document.getElementById('search-section-title').textContent = filters.length ? `搜尋結果 (${notes.length})` : '瀏覽所有筆記';

                renderNotes(notes);
            } catch (err) {
                document.getElementById('note-list').innerHTML =
                    `<p style="color:var(--accent-red);text-align:center;padding:40px;">搜尋失敗：${err.message}</p>`;
            }
        }

        async function loadTagOptions(selectedSem, selectedSub, selectedTea, selectedTag, selectedDep, selectedCT) {
            try {
                const result = await apiGetTags();
                const tags = Array.isArray(result) ? result : (result.data || []);
                const semList = document.getElementById('list-semester');
                const subList = document.getElementById('list-subject');
                const teaList = document.getElementById('list-teacher');
                const tagList = document.getElementById('list-tag');
                const depList = document.getElementById('list-department');
                const ctList = document.getElementById('list-course-type');
                
                tags.forEach(tag => {
                    const name = tag.tag_name || tag.name;
                    if (!name) return;
                    const option = document.createElement('option');
                    option.value = name;
                    
                    if (tag.tag_type === 'SEMESTER') {
                        semList.appendChild(option);
                    } else if (tag.tag_type === 'SUBJECT') {
                        subList.appendChild(option);
                    } else if (tag.tag_type === 'TEACHER') {
                        teaList.appendChild(option);
                    } else if (tag.tag_type === 'DEPARTMENT') {
                        depList.appendChild(option);
                    } else if (tag.tag_type === 'COURSE_TYPE') {
                        ctList.appendChild(option);
                    } else {
                        tagList.appendChild(option);
                    }
                });

                if (selectedSem) document.getElementById('filter-semester').value = selectedSem;
                if (selectedSub) document.getElementById('filter-subject').value = selectedSub;
                if (selectedTea) document.getElementById('filter-teacher').value = selectedTea;
                if (selectedTag) document.getElementById('filter-tag').value = selectedTag;
                if (selectedDep) document.getElementById('filter-department').value = selectedDep;
                if (selectedCT) document.getElementById('filter-course-type').value = selectedCT;
            } catch (_) {}
        }

        function applySearchFilters(event) {
            event.preventDefault();
            event.stopImmediatePropagation();
            const params = new URLSearchParams();
            const keyword = document.getElementById('search-input').value.trim();
            const semester = document.getElementById('filter-semester').value;
            const department = document.getElementById('filter-department').value;
            const courseType = document.getElementById('filter-course-type').value;
            const subject = document.getElementById('filter-subject').value;
            const teacher = document.getElementById('filter-teacher').value;
            const tag = document.getElementById('filter-tag').value;
            const seller = document.getElementById('filter-seller').value.trim();
            const minPrice = document.getElementById('filter-min-price').value;
            const maxPrice = document.getElementById('filter-max-price').value;
            const sort = document.getElementById('filter-sort').value;
            const group = document.getElementById('filter-group').value;
            const hideOwnedToggle = document.getElementById('filter-hide-owned');
            
            if (keyword) params.set('q', keyword);
            if (semester) params.set('semester', semester);
            if (department) params.set('department', department);
            if (courseType) params.set('course_type', courseType);
            if (subject) params.set('subject', subject);
            if (teacher) params.set('teacher', teacher);
            if (tag) params.set('tag', tag);
            if (seller) params.set('seller', seller);
            if (minPrice !== '') params.set('min_price', minPrice);
            if (maxPrice !== '') params.set('max_price', maxPrice);
            if (sort) params.set('sort', sort);
            if (hideOwnedToggle && hideOwnedToggle.classList.contains('is-active')) {
                params.set('hide_owned', 'true');
            }
            window.location.href = `/pages/store/search.html${params.toString() ? '?' + params.toString() : ''}`;
        }
    </script>
</body>
</html>
