<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編輯筆記 — AurorNote</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <header id="global-header"></header>

    <main>
        <div class="dashboard-header">
            <div>
                <h1 class="title">編輯筆記</h1>
                <p class="subtitle is-6" id="edit-subtitle">載入中...</p>
            </div>
            <a class="button is-light" href="/pages/dashboard/seller_dashboard">回賣家中心</a>
        </div>

        <div class="edit-note-layout">
            <section class="box dashboard-panel">
                <h2 class="title is-4">商店資訊</h2>
                <form id="edit-note-form">
                    <div class="field form-group">
                        <label class="label" for="edit-title">筆記名稱</label>
                        <div class="control">
                            <input class="input" type="text" id="edit-title" disabled>
                        </div>
                        <p class="help">筆記名稱目前不可在此修改。</p>
                    </div>

                    <div class="field form-group">
                        <label class="label" for="edit-price">定價 (NT$)</label>
                        <div class="control">
                            <input class="input" type="number" id="edit-price" min="0" step="0.01" required>
                        </div>
                    </div>

                    <div class="field form-group">
                        <label class="label" for="edit-desc">筆記介紹</label>
                        <div class="control">
                            <textarea class="textarea" id="edit-desc" rows="7" placeholder="輸入商店頁會顯示的筆記介紹"></textarea>
                        </div>
                        <div class="box markdown-preview-box mt-3">
                            <h3 class="title is-6">介紹預覽</h3>
                            <div class="markdown-content" id="preview-desc">—</div>
                        </div>
                    </div>

                    <div class="field form-group">
                        <label class="label">筆記 Tags</label>
                        <div class="tags" id="current-tags"><span class="tag">載入中...</span></div>
                        <label class="label is-small has-text-grey-light mt-3">從現有標籤中搜尋與選擇 (直接輸入並點選即可加入)</label>
                        <div class="columns is-multiline is-variable is-2 mb-2">
                            <div class="column is-4 pb-0">
                                <input class="input is-small tag-search-input" type="text" data-type="SEMESTER" list="seller-list-semester" placeholder="搜尋學期" autocomplete="off">
                                <datalist id="seller-list-semester"></datalist>
                            </div>
                            <div class="column is-4 pb-0">
                                <input class="input is-small tag-search-input" type="text" data-type="DEPARTMENT" list="seller-list-department" placeholder="搜尋系所" autocomplete="off">
                                <datalist id="seller-list-department"></datalist>
                            </div>
                            <div class="column is-4 pb-0">
                                <input class="input is-small tag-search-input" type="text" data-type="COURSE_TYPE" list="seller-list-course-type" placeholder="搜尋課程屬性" autocomplete="off">
                                <datalist id="seller-list-course-type"></datalist>
                            </div>
                            <div class="column is-4 pb-0">
                                <input class="input is-small tag-search-input" type="text" data-type="SUBJECT" list="seller-list-subject" placeholder="搜尋科目" autocomplete="off">
                                <datalist id="seller-list-subject"></datalist>
                            </div>
                            <div class="column is-4 pb-0">
                                <input class="input is-small tag-search-input" type="text" data-type="TEACHER" list="seller-list-teacher" placeholder="搜尋老師" autocomplete="off">
                                <datalist id="seller-list-teacher"></datalist>
                            </div>
                            <div class="column is-4 pb-0">
                                <input class="input is-small tag-search-input" type="text" data-type="GENERAL" list="seller-list-general" placeholder="搜尋一般標籤" autocomplete="off">
                                <datalist id="seller-list-general"></datalist>
                            </div>
                        </div>

                        <label class="label is-small has-text-grey-light mt-3">找不到標籤？建立全新標籤</label>
                        <div class="field has-addons">
                            <div class="control">
                                <div class="select is-small">
                                    <select id="new-tag-type">
                                        <option value="GENERAL">一般</option>
                                        <option value="SUBJECT">科目</option>
                                        <option value="TEACHER">老師</option>
                                        <option value="COURSE_TYPE">課程屬性</option>
                                    </select>
                                </div>
                            </div>
                            <div class="control is-expanded">
                                <input class="input is-small" type="text" id="new-tag-input" placeholder="新增 tag 名稱">
                            </div>
                            <div class="control">
                                <button class="button is-primary is-small" type="button" id="create-tag-btn">建立並加入</button>
                            </div>
                        </div>
                        <article class="message is-warning mt-4">
                            <div class="message-body py-2 px-3" style="font-size: 0.9rem;">
                                <strong>⚠️ 必填標籤提醒：</strong> 為了讓買家能快速找到您的筆記，<strong>【學期】</strong>、<strong>【系所】</strong>與<strong>【科目】</strong>標籤是<strong>必選的</strong>！缺少這三個標籤將無法正式發佈上架。
                            </div>
                        </article>
                    </div>

                    <div id="edit-error" class="notification is-danger is-light" style="display:none;"></div>
                    <div id="edit-success" class="notification is-success is-light" style="display:none;"></div>

                    <div class="field is-grouped is-grouped-right">
                        <p class="control"><a class="button is-light" href="/pages/dashboard/seller_dashboard">取消</a></p>
                        <p class="control"><button class="button is-primary" type="submit" id="save-note-btn">保存</button></p>
                    </div>
                </form>
            </section>

            <section class="box dashboard-panel">
                <h2 class="title is-4">編輯說明</h2>
                <div class="content has-text-grey-light">
                    <p>定價與介紹會在上方預覽即時更新。</p>
                    <p>圖片與筆記本體可在下方素材區即時上傳或刪除。</p>
                    <p>修改定價與介紹後，請按保存才會生效。</p>
                </div>
            </section>
        </div>

        <section class="box dashboard-panel mt-5">
            <div class="media-manager-title">
                <h2 class="title is-4">圖片與筆記本體</h2>
            </div>

            <div id="media-grid-container" class="edit-media-grid">
                <p style="color:var(--text-muted); grid-column:1/-1;">載入中...</p>
            </div>

            <div class="upload-section mt-5">
                <h3 class="title is-5">新增素材</h3>
                <div class="edit-upload-row">
                    <div class="select">
                        <select id="mm-media-type">
                            <option value="media">預覽圖片</option>
                            <option value="note_file">筆記本體</option>
                        </select>
                    </div>
                    <div class="file has-name is-fullwidth" style="flex:1; min-width:220px;">
                        <label class="file-label">
                            <input class="file-input" type="file" id="mm-file-input" accept="image/*,.zip,.exe,.rar,.7z" onchange="onFileChosen(this)">
                            <span class="file-cta"><span class="file-label">選擇檔案</span></span>
                            <span class="file-name" id="mm-file-label">尚未選擇檔案</span>
                        </label>
                    </div>
                    <button class="button is-primary" id="mm-upload-btn" onclick="doUpload()">上傳</button>
                </div>
                <p class="help">圖片會顯示在商店頁；筆記本體會在買家擁有授權後才能下載。</p>
                <div class="notification is-info is-light mt-3" id="mm-progress" style="display:none;">上傳中，請稍候…</div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/main.js"></script>
    <script>
        let currentNoteId = null;
        let currentNote = null;
        let allTags = [];

        document.addEventListener('DOMContentLoaded', async () => {
            const role = getCurrentRole();
            if (role !== 'SELLER' && role !== 'ADMIN') {
                alert('存取被拒：您沒有賣家權限');
                window.location.href = '/';
                return;
            }

            const params = new URLSearchParams(window.location.search);
            currentNoteId = Number(params.get('id'));
            if (!currentNoteId) {
                showError('缺少筆記 ID');
                return;
            }

            await loadNoteForEdit();
            document.getElementById('edit-note-form').addEventListener('submit', saveNote);
            document.getElementById('edit-desc').addEventListener('input', updatePreview);
            document.getElementById('add-existing-tag-btn').addEventListener('click', addExistingTag);
            document.getElementById('create-tag-btn').addEventListener('click', createAndAddTag);
        });

        async function loadNoteForEdit() {
            try {
                const result = await apiGetSellerNotes();
                const notes = Array.isArray(result) ? result : (result.data || result.notes || []);
                currentNote = notes.find(g => Number(g.note_id || g.id) === currentNoteId);

                if (!currentNote) {
                    showError('找不到可編輯的筆記');
                    return;
                }

                const title = currentNote.title || '';
                const desc = currentNote.desc || currentNote.description || '';
                const price = Number(currentNote.price || 0);

                document.title = `編輯 ${title} — AurorNote`;
                document.getElementById('edit-subtitle').textContent = title;
                document.getElementById('edit-title').value = title;
                document.getElementById('edit-price').value = price;
                document.getElementById('edit-desc').value = desc;

                updatePreview();
                await loadTagsForEdit();
                renderCurrentTags();
                renderMediaGrid(currentNote.media || []);
            } catch (err) {
                showError(`載入失敗：${err.message}`);
            }
        }

        let tagsMap = {};

        async function loadTagsForEdit() {
            const result = await apiGetTags();
            allTags = Array.isArray(result) ? result : (result.data || []);
            
            const lists = {
                SEMESTER: document.getElementById('seller-list-semester'),
                DEPARTMENT: document.getElementById('seller-list-department'),
                COURSE_TYPE: document.getElementById('seller-list-course-type'),
                SUBJECT: document.getElementById('seller-list-subject'),
                TEACHER: document.getElementById('seller-list-teacher'),
                GENERAL: document.getElementById('seller-list-general')
            };

            Object.values(lists).forEach(list => { if(list) list.innerHTML = ''; });
            tagsMap = {};

            allTags.forEach(tag => {
                const type = tag.tag_type || 'GENERAL';
                const name = tag.tag_name || tag.name;
                tagsMap[`${type}_${name}`] = tag.tag_id;

                const option = document.createElement('option');
                option.value = name;
                if (lists[type]) {
                    lists[type].appendChild(option);
                }
            });

            // Initialize event listeners for the search inputs
            document.querySelectorAll('.tag-search-input').forEach(input => {
                // Remove old listeners to prevent duplicates on refresh
                const newInp = input.cloneNode(true);
                input.parentNode.replaceChild(newInp, input);
                newInp.addEventListener('change', async (e) => {
                    const val = e.target.value.trim();
                    if (!val) return;
                    const type = e.target.getAttribute('data-type');
                    
                    if (type === 'SEMESTER' || type === 'DEPARTMENT') {
                        const existingTags = currentNote.tags || currentNote.Tags || [];
                        const existingOfType = existingTags.find(t => (t.tag_type || 'GENERAL') === type);
                        if (existingOfType) {
                            showError(`這份筆記已經有【${type === 'SEMESTER' ? '學期' : '系所'}】標籤了。每個筆記最多只能有一個該類標籤，請先刪除原有的再加入新標籤。`);
                            e.target.value = ''; // clear
                            return;
                        }
                    }

                    const tagId = tagsMap[`${type}_${val}`];
                    if (tagId) {
                        try {
                            await apiAddTagToNote(currentNoteId, tagId);
                            await refreshNoteForEdit();
                            renderCurrentTags();
                        } catch (err) {
                            showError(`加入 tag 失敗：${err.message}`);
                        }
                    } else {
                        showError(`標籤 "${val}" 不存在，請在下方「建立全新標籤」。`);
                    }
                    e.target.value = ''; // clear after action
                });
            });
        }

        function renderCurrentTags() {
            const container = document.getElementById('current-tags');
            const tags = currentNote.tags || currentNote.Tags || [];
            if (!tags.length) {
                container.innerHTML = '<span class="tag">尚未設定 tag</span>';
                return;
            }
            
            const groupedTags = {
                SUBJECT: [],
                SEMESTER: [],
                DEPARTMENT: [],
                COURSE_TYPE: [],
                TEACHER: [],
                GENERAL: []
            };

            tags.forEach(t => {
                const type = (typeof t === 'object') ? (t.tag_type || 'GENERAL') : 'GENERAL';
                if (groupedTags[type]) {
                    groupedTags[type].push(t);
                } else {
                    groupedTags['GENERAL'].push(t);
                }
            });

            const order = ['SUBJECT', 'SEMESTER', 'DEPARTMENT', 'COURSE_TYPE', 'TEACHER', 'GENERAL'];
            
            container.innerHTML = '';
            
            order.forEach(type => {
                if (groupedTags[type].length > 0) {
                    const row = document.createElement('div');
                    row.style.display = 'flex';
                    row.style.flexWrap = 'wrap';
                    row.style.gap = '6px';
                    row.style.marginBottom = '8px';
                    
                    groupedTags[type].forEach(tag => {
                        const tagName = escapeHtml(tag.tag_name || tag.name || '');
                        const tagId = Number(tag.tag_id);
                        const tagType = tag.tag_type || 'GENERAL';
                        
                        row.innerHTML += `
                        <span class="tag is-medium type-${tagType}">
                            ${tagName}
                            <button class="delete is-small" type="button" aria-label="remove" onclick="removeNoteTag(${tagId})"></button>
                        </span>
                        `;
                    });
                    container.appendChild(row);
                }
            });
        }

        async function createAndAddTag() {
            const input = document.getElementById('new-tag-input');
            const typeInput = document.getElementById('new-tag-type');
            const tagName = input.value.trim();
            const tagType = typeInput ? typeInput.value : 'GENERAL';
            if (!tagName) return;
            try {
                const created = await apiCreateTag(tagName, tagType);
                const tag = created.data || created.tag || created;
                await loadTagsForEdit();
                await apiAddTagToNote(currentNoteId, tag.tag_id);
                input.value = '';
                await refreshNoteForEdit();
                renderCurrentTags();
            } catch (err) {
                showError(`建立 tag 失敗：${err.message}`);
            }
        }

        async function removeNoteTag(tagId) {
            try {
                await apiRemoveTagFromNote(currentNoteId, tagId);
                await refreshNoteForEdit();
                renderCurrentTags();
            } catch (err) {
                showError(`移除 tag 失敗：${err.message}`);
            }
        }

        function updatePreview() {
            const desc = document.getElementById('edit-desc').value.trim() || '尚未填寫介紹';
            document.getElementById('preview-desc').innerHTML = renderMarkdown(desc);
        }

        async function saveNote(e) {
            e.preventDefault();
            const btn = document.getElementById('save-note-btn');
            const errorEl = document.getElementById('edit-error');
            const successEl = document.getElementById('edit-success');
            const price = Number(document.getElementById('edit-price').value || 0);
            const desc = document.getElementById('edit-desc').value.trim();

            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            // Tag validation
            const tags = currentNote.tags || currentNote.Tags || [];
            const hasSemester = tags.some(t => (t.tag_type || 'GENERAL') === 'SEMESTER');
            const hasDepartment = tags.some(t => (t.tag_type || 'GENERAL') === 'DEPARTMENT');
            const hasSubject = tags.some(t => (t.tag_type || 'GENERAL') === 'SUBJECT');

            if (!hasSemester) {
                showError('請至少選擇一個【學期】標籤，這是必填項目。');
                return;
            }
            if (!hasDepartment) {
                showError('請至少選擇一個【系所】標籤，這是必填項目。');
                return;
            }
            if (!hasSubject) {
                showError('請至少選擇一個【科目】標籤，這是必填項目。');
                return;
            }

            btn.disabled = true;
            btn.textContent = '保存中...';

            try {
                await apiUpdateNote(currentNoteId, price, desc);
                successEl.textContent = '已保存變更。';
                successEl.style.display = 'block';
                setTimeout(() => window.location.href = '/pages/dashboard/seller_dashboard', 700);
            } catch (err) {
                showError(`保存失敗：${err.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = '保存';
            }
        }

        function showError(message) {
            const errorEl = document.getElementById('edit-error');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        function renderMediaGrid(mediaList) {
            const container = document.getElementById('media-grid-container');
            if (!mediaList || mediaList.length === 0) {
                container.innerHTML = `<p style="color:var(--text-muted); grid-column:1/-1;">尚無任何素材，請在下方上傳。</p>`;
                return;
            }

            container.innerHTML = '';
            mediaList.forEach(m => {
                const isImage = m.media_type === 'media';
                const card = document.createElement('div');
                card.className = 'media-card';
                const thumb = isImage
                    ? `<img class="media-card-thumb" src="${escapeHtml(m.file_url)}" alt="media" loading="lazy"
                           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                       <div class="media-card-file" style="display:none;"><span>載入失敗</span></div>`
                    : `<div class="media-card-file"><span style="word-break:break-all;">${escapeHtml(m.file_url.split('/').pop())}</span></div>`;

                card.innerHTML = `
                    ${thumb}
                    <div class="media-card-info">
                        <span class="badge ${isImage ? 'badge-img' : 'badge-file'}">${isImage ? '圖片' : '筆記本體'}</span>
                        <button class="button is-text is-small media-card-del" title="刪除此素材"
                            onclick="deleteMedia(${m.media_id})">刪除</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function refreshNoteForEdit() {
            const result = await apiGetSellerNotes();
            const notes = Array.isArray(result) ? result : (result.data || result.notes || []);
            currentNote = notes.find(g => Number(g.note_id || g.id) === currentNoteId);
            renderMediaGrid(currentNote ? (currentNote.media || []) : []);
        }

        async function deleteMedia(mediaId) {
            if (!confirm('確定要刪除此素材？此操作無法復原。')) return;
            try {
                const token = localStorage.getItem('token');
                const res = await fetch(`/api/seller/notes/${currentNoteId}/media/${mediaId}`, {
                    method: 'DELETE',
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                await parseResponse(res);
                await refreshNoteForEdit();
            } catch (err) {
                alert(`刪除失敗：${err.message}`);
            }
        }

        function onFileChosen(input) {
            const label = document.getElementById('mm-file-label');
            label.textContent = input.files && input.files[0] ? input.files[0].name : '尚未選擇檔案';
        }

        function resetUploadForm() {
            const input = document.getElementById('mm-file-input');
            if (input) input.value = '';
            document.getElementById('mm-file-label').textContent = '尚未選擇檔案';
            document.getElementById('mm-progress').style.display = 'none';
        }

        async function doUpload() {
            const fileInput = document.getElementById('mm-file-input');
            const typeSelect = document.getElementById('mm-media-type');
            const btn = document.getElementById('mm-upload-btn');
            const progress = document.getElementById('mm-progress');

            if (!fileInput.files || !fileInput.files[0]) {
                alert('請先選擇要上傳的檔案');
                return;
            }

            const fileSize = fileInput.files[0].size;
            if (fileSize > 40 * 1024 * 1024) {
                alert('上傳的檔案大小不能超過 40MB');
                return;
            }

            let currentTotalSize = 0;
            if (currentNote && currentNote.media) {
                currentNote.media.forEach(m => {
                    currentTotalSize += (m.file_size || 0);
                });
            }

            if (currentTotalSize + fileSize > 50 * 1024 * 1024) {
                alert('單一筆記上傳素材大小總額不能超過 50MB');
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('media_type', typeSelect.value);

            btn.disabled = true;
            progress.style.display = 'block';
            try {
                const token = localStorage.getItem('token');
                const res = await fetch(`/api/seller/notes/${currentNoteId}/media`, {
                    method: 'POST',
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {},
                    body: formData
                });
                await parseResponse(res);
                resetUploadForm();
                await refreshNoteForEdit();
            } catch (err) {
                alert(`上傳失敗：${err.message}`);
            } finally {
                btn.disabled = false;
                progress.style.display = 'none';
            }
        }
    </script>
</body>
</html>
