<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賣家中心 — AurorNote</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>

    <header id="global-header"></header>

    <main>
        <div class="dashboard-header">
            <h1 class="title">賣家中心</h1>
            <span class="tag role-badge seller">SELLER</span>
        </div>

        <div class="dashboard-stats" id="sales-stats">
            <p style="color:var(--text-muted);">載入中...</p>
        </div>

        <div class="tabs is-boxed" style="margin-bottom: 1rem;">
            <ul>
                <li id="tab-manage" class="is-active"><a onclick="switchTab('manage')">管理我的筆記</a></li>
                <li id="tab-publish"><a onclick="switchTab('publish')">發行新筆記</a></li>
            </ul>
        </div>

        <div id="panel-manage" class="dashboard-grid" style="grid-template-columns: 1fr;">
            <!-- 管理筆記面板 -->
            <div class="box dashboard-panel">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                    <h2 class="title is-4" style="margin-bottom:0;">管理我的筆記</h2>
                </div>
                <div class="library-list" id="my-published-notes">
                    <p style="color:var(--text-muted);">載入中...</p>
                </div>
            </div>
        </div>

        <div id="panel-publish" class="dashboard-grid" style="grid-template-columns: 1fr; display: none;">
            <!-- 上架新筆記面板 -->
            <div class="box dashboard-panel">
                <h2 class="title is-4">發行新筆記</h2>
                <form id="upload-note-form" class="dev-form">
                    <div class="field form-group">
                        <label class="label" for="new-note-title">筆記名稱</label>
                        <div class="control"><input class="input" type="text" id="new-note-title" placeholder="輸入炫酷的標題" required></div>
                    </div>
                    <div class="field form-group">
                        <label class="label" for="new-note-price">定價 (NT$)</label>
                        <div class="control"><input class="input" type="number" id="new-note-price" min="0" step="0.01" placeholder="0 表示免費" required></div>
                    </div>
                    <div class="field form-group">
                        <label class="label" for="new-note-desc">筆記介紹</label>
                        <div class="control"><textarea class="textarea" id="new-note-desc" placeholder="簡短描述你的筆記亮點..." required style="min-height: 120px;"></textarea></div>
                    </div>
                    <button type="submit" class="button is-primary is-fullwidth" id="publish-btn">
                        建立草稿並繼續編輯
                    </button>
                </form>
            </div>
        </div>

    </main>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/main.js"></script>
    <script>
        // ── Init ──────────────────────────────────────────
        document.addEventListener("DOMContentLoaded", async () => {
            const role = getCurrentRole();
            if (role !== 'SELLER' && role !== 'ADMIN') {
                alert("存取被拒：您沒有賣家權限");
                window.location.href = '/';
                return;
            }
            await loadDashboard();
        });

        // ── Tab switching logic ───────────────────────────
        window.switchTab = function(tabName) {
            document.getElementById('tab-manage').classList.remove('is-active');
            document.getElementById('tab-publish').classList.remove('is-active');
            document.getElementById('panel-manage').style.display = 'none';
            document.getElementById('panel-publish').style.display = 'none';

            document.getElementById('tab-' + tabName).classList.add('is-active');
            // Dashboard panels use grid-template-columns in our CSS, so use grid
            document.getElementById('panel-' + tabName).style.display = 'grid';
        };

        // ── Load dashboard ─────────────────────────────────
        async function loadDashboard() {
            try {
                const result = await apiGetSellerNotes();
                const myNotes = Array.isArray(result) ? result : (result.data || result.notes || []);

                let totalRevenue = 0, totalSales = 0;
                await Promise.all(myNotes.map(async g => {
                    try {
                        const s = await apiGetNoteStats(g.note_id || g.id);
                        totalRevenue += Number(s.total_revenue || s.revenue || 0);
                        totalSales += Number(s.total_sales || s.sales || 0);
                    } catch (_) { }
                }));

                const activeCount = myNotes.filter(g => !g.deleted_at && g.status !== 'TAKEN_DOWN').length;

                document.getElementById('sales-stats').innerHTML = `
                    <div class="stat-card">
                        <h3>總營收 (NT$)</h3>
                        <div class="stat-value" style="color:var(--accent-green);">$${totalRevenue.toLocaleString()}</div>
                    </div>
                    <div class="stat-card">
                        <h3>累積銷量（套）</h3>
                        <div class="stat-value">${totalSales.toLocaleString()}</div>
                    </div>
                    <div class="stat-card">
                        <h3>上架中筆記</h3>
                        <div class="stat-value" style="color:var(--accent-blue);">${activeCount}</div>
                    </div>
                `;

                renderMyNotes(myNotes);
            } catch (err) {
                document.getElementById('sales-stats').innerHTML =
                    `<p style="color:var(--accent-red);">載入失敗：${err.message}</p>`;
            }
        }

        // ── Render note list ───────────────────────────────
        function renderMyNotes(notes) {
            const listEl = document.getElementById('my-published-notes');
            listEl.innerHTML = '';

            if (notes.length === 0) {
                listEl.innerHTML = `<div class="empty-state"><p>尚未上架任何筆記</p></div>`;
                return;
            }

            notes.forEach(note => {
                const noteId = note.note_id || note.id;
                let statusBadge = '';
                let actionBtns = '';

                if (note.status === 'ACTIVE') {
                    statusBadge = `<span class="tag status-badge status-active">上架中</span>`;
                    actionBtns = `
                        <button class="button is-primary is-small" onclick="window.location.href='/pages/dashboard/edit_note?id=${noteId}'">編輯</button>
                        <button class="button is-danger is-light is-small" onclick="takeDownNote(${noteId})">下架</button>
                    `;
                } else if (note.status === 'DRAFT') {
                    statusBadge = `<span class="tag status-badge" style="background:var(--accent-purple); color:white;">草稿</span>`;
                    actionBtns = `
                        <button class="button is-primary is-small" onclick="window.location.href='/pages/dashboard/edit_note?id=${noteId}'">編輯素材與科目</button>
                        <button class="button is-success is-small" onclick="publishNote(${noteId})">發佈</button>
                    `;
                } else {
                    statusBadge = `<span class="tag status-badge status-taken-down">已下架</span>`;
                    actionBtns = `<span style="color:var(--text-muted);font-size:13px;">已停止販售</span>`;
                }

                const item = document.createElement('div');
                item.className = 'library-item';
                item.innerHTML = `
                    <div class="library-item-header">
                        <div class="library-item-info">
                            <h3 style="color:var(--accent-cyan);">${escapeHtml(note.title)}</h3>
                            <p style="color:var(--text-secondary); margin-top:5px;">
                                定價：NT$ ${Number(note.price).toLocaleString()}
                                &nbsp;|&nbsp; ${statusBadge}
                            </p>
                        </div>
                        <div class="library-item-actions">
                            ${actionBtns}
                        </div>
                    </div>
                `;
                listEl.appendChild(item);
            });
        }

        // ── Publish form ───────────────────────────────────
        document.getElementById('upload-note-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('new-note-title').value.trim();
            const price = parseFloat(document.getElementById('new-note-price').value) || 0;
            const desc = document.getElementById('new-note-desc').value.trim();
            const btn = document.getElementById('publish-btn');

            btn.disabled = true;
            btn.textContent = '建立中...';
            try {
                const result = await apiCreateNote(title, price, desc);
                alert(`《${title}》草稿建立成功！請繼續編輯標籤與內容`);
                document.getElementById('upload-note-form').reset();
                window.location.href = '/pages/dashboard/edit_note.html?id=' + (result.note.note_id || result.note.id);
                await loadDashboard();
            } catch (err) {
                alert(`上架失敗：${err.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = '立即上架';
            }
        });

        // ── Actions ────────────────────────────────────────
        async function publishNote(id) {
            try {
                const res = await authFetch(`/api/seller/notes/${id}/publish`, { method: 'PUT' });
                if (res.ok) {
                    showToast('筆記已正式上架！', 'success');
                    loadDashboard();
                } else {
                    const data = await res.json();
                    showToast('發佈失敗：' + (data.error || '未知錯誤'), 'error');
                }
            } catch (err) {
                console.error(err);
                showToast('發生錯誤', 'error');
            }
        }

        async function takeDownNote(id) {
            if (!confirm('確定要下架此筆記嗎？已購買的買家仍可下載，但商店將不再顯示。')) return;
            try {
                await apiDeleteNote(id);
                alert('筆記已下架！');
                loadDashboard();
            } catch (err) {
                console.error(err);
                alert('下架失敗');
            }
        }
    </script>
</body>

</html>
