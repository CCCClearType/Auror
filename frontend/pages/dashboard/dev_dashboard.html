<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>開發者中心 — VaporAuror</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>

    <header id="global-header"></header>

    <main>
        <div class="dashboard-header">
            <h1 class="title">開發者中心</h1>
            <span class="tag role-badge dev">DEVELOPER</span>
        </div>

        <div class="dashboard-stats" id="sales-stats">
            <p style="color:var(--text-muted);">載入中...</p>
        </div>

        <div class="dashboard-grid">
            <!-- 上架新遊戲面板 -->
            <div class="box dashboard-panel">
                <h2 class="title is-4">發行新遊戲</h2>
                <form id="upload-game-form" class="dev-form">
                    <div class="field form-group">
                        <label class="label" for="new-game-title">遊戲名稱</label>
                        <div class="control"><input class="input" type="text" id="new-game-title" placeholder="輸入炫酷的標題"
                                required></div>
                    </div>
                    <div class="field form-group">
                        <label class="label" for="new-game-price">定價 (NT$)</label>
                        <div class="control"><input class="input" type="number" id="new-game-price" min="0" step="0.01"
                                placeholder="0 表示免費" required></div>
                    </div>
                    <div class="field form-group">
                        <label class="label" for="new-game-desc">遊戲介紹</label>
                        <div class="control"><textarea class="textarea" id="new-game-desc" placeholder="簡短描述你的遊戲亮點..."
                                required style="min-height: 120px;"></textarea></div>
                    </div>
                    <button type="submit" class="button is-primary is-fullwidth" id="publish-btn">
                        立即上架
                    </button>
                </form>
            </div>

            <!-- 管理遊戲面板 -->
            <div class="box dashboard-panel">
                <h2 class="title is-4">管理我的遊戲</h2>
                <div class="library-list" id="my-published-games">
                    <p style="color:var(--text-muted);">載入中...</p>
                </div>
            </div>
        </div>

    </main>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/main.js"></script>
    <script>
        // ── Init ──────────────────────────────────────────
        document.addEventListener("DOMContentLoaded", async () => {
            const role = getCurrentRole();
            if (role !== 'DEVELOPER' && role !== 'ADMIN') {
                alert("存取被拒：您沒有開發者權限");
                window.location.href = '/';
                return;
            }
            await loadDashboard();
        });

        // ── Load dashboard ─────────────────────────────────
        async function loadDashboard() {
            try {
                const result = await apiGetDeveloperGames();
                const myGames = Array.isArray(result) ? result : (result.data || result.games || []);

                let totalRevenue = 0, totalSales = 0;
                await Promise.all(myGames.map(async g => {
                    try {
                        const s = await apiGetGameStats(g.game_id || g.id);
                        totalRevenue += Number(s.total_revenue || s.revenue || 0);
                        totalSales += Number(s.total_sales || s.sales || 0);
                    } catch (_) { }
                }));

                const activeCount = myGames.filter(g => !g.deleted_at && g.status !== 'TAKEN_DOWN').length;

                document.getElementById('sales-stats').innerHTML = `
                    <div class="stat-card">
                        <h3>總營收 (NT$)</h3>
                        <div class="stat-value" style="color:var(--accent-green);">$${totalRevenue.toLocaleString()}</div>
                    </div>
                    <div class="stat-card">
                        <h3>累積銷量（套）</h3>
                        <div class="stat-value">${totalSales.toLocaleString()}</div>
                    </div>
                    <div class="stat-card">
                        <h3>上架中遊戲</h3>
                        <div class="stat-value" style="color:var(--accent-blue);">${activeCount}</div>
                    </div>
                `;

                renderMyGames(myGames);
            } catch (err) {
                document.getElementById('sales-stats').innerHTML =
                    `<p style="color:var(--accent-red);">載入失敗：${err.message}</p>`;
            }
        }

        // ── Render game list ───────────────────────────────
        function renderMyGames(games) {
            const listEl = document.getElementById('my-published-games');
            listEl.innerHTML = '';

            if (games.length === 0) {
                listEl.innerHTML = `<div class="empty-state"><p>尚未上架任何遊戲</p></div>`;
                return;
            }

            games.forEach(game => {
                const gameId = game.game_id || game.id;
                let statusBadge = '';
                let actionBtns = '';

                if (game.status === 'ACTIVE') {
                    statusBadge = `<span class="tag status-badge status-active">上架中</span>`;
                    actionBtns = `
                        <button class="button is-primary is-small" onclick="window.location.href='/pages/dashboard/edit_game?id=${gameId}'">編輯</button>
                        <button class="button is-danger is-light is-small" onclick="takeDownGame(${gameId})">下架</button>
                    `;
                } else if (game.status === 'DRAFT') {
                    statusBadge = `<span class="tag status-badge" style="background:var(--accent-purple); color:white;">草稿</span>`;
                    actionBtns = `
                        <button class="button is-primary is-small" onclick="window.location.href='/pages/dashboard/edit_game?id=${gameId}'">編輯素材與標籤</button>
                        <button class="button is-success is-small" onclick="publishGame(${gameId})">發佈</button>
                    `;
                } else {
                    statusBadge = `<span class="tag status-badge status-taken-down">已下架</span>`;
                    actionBtns = `<span style="color:var(--text-muted);font-size:13px;">已停止販售</span>`;
                }

                const item = document.createElement('div');
                item.className = 'library-item';
                item.innerHTML = `
                    <div class="library-item-header">
                        <div class="library-item-info">
                            <h3 style="color:var(--accent-cyan);">${escapeHtml(game.title)}</h3>
                            <p style="color:var(--text-secondary); margin-top:5px;">
                                定價：NT$ ${Number(game.price).toLocaleString()}
                                &nbsp;|&nbsp; ${statusBadge}
                            </p>
                        </div>
                        <div class="library-item-actions">
                            ${actionBtns}
                        </div>
                    </div>
                `;
                listEl.appendChild(item);
            });
        }

        // ── Publish form ───────────────────────────────────
        document.getElementById('upload-game-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('new-game-title').value.trim();
            const price = parseFloat(document.getElementById('new-game-price').value) || 0;
            const desc = document.getElementById('new-game-desc').value.trim();
            const btn = document.getElementById('publish-btn');

            btn.disabled = true;
            btn.textContent = '上架中...';
            try {
                await apiCreateGame(title, price, desc);
                alert(`《${title}》上架成功！`);
                document.getElementById('upload-game-form').reset();
                await loadDashboard();
            } catch (err) {
                alert(`上架失敗：${err.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = '立即上架';
            }
        });

        // ── Actions ────────────────────────────────────────
        async function publishGame(id) {
            try {
                const res = await authFetch(`/api/developer/games/${id}/publish`, { method: 'PUT' });
                if (res.ok) {
                    showToast('遊戲已正式上架！', 'success');
                    loadDashboard();
                } else {
                    const data = await res.json();
                    showToast('發佈失敗：' + (data.error || '未知錯誤'), 'error');
                }
            } catch (err) {
                console.error(err);
                showToast('發生錯誤', 'error');
            }
        }

        async function takeDownGame(id) {
            if (!confirm('確定要下架此遊戲嗎？已購買的玩家仍可下載，但商店將不再顯示。')) return;
            try {
                await apiDeleteGame(id);
                alert('遊戲已下架！');
                loadDashboard();
            } catch (err) {
                console.error(err);
                alert('下架失敗');
            }
        }
    </script>
</body>

</html>
