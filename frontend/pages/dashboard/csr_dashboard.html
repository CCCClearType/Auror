<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客服處理中心 — AurorNote</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

    <header id="global-header"></header>

    <main>
        <div class="dashboard-header">
            <h1 class="title">客服處理中心</h1>
            <span class="tag role-badge csr">CSR</span>
        </div>

        <div class="dashboard-grid">
            <div class="box dashboard-panel">
                <h2 class="title is-4">待處理退款申請</h2>
                <div class="library-list" id="refund-requests-list">
                    <p style="color:var(--text-muted);">載入中...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const role = getCurrentRole();
            if (role !== 'CSR' && role !== 'ADMIN') {
                alert("存取被拒：您沒有客服權限");
                window.location.href = '/';
                return;
            }
            await loadRefunds();
        });

        // ─── 退款列表 ──────────────────────────────────────────
        async function loadRefunds() {
            try {
                // GET /api/admin/refunds
                const result  = await apiGetRefunds();
                const refunds = Array.isArray(result) ? result : (result.data || result.refunds || []);
                renderRefunds(refunds.filter(r => r.status === 'PENDING' || r.status === 'pending'));
            } catch (err) {
                document.getElementById('refund-requests-list').innerHTML =
                    `<p style="color:var(--accent-red);">載入失敗：${err.message}</p>`;
            }
        }

        function renderRefunds(refunds) {
            const listEl = document.getElementById('refund-requests-list');
            listEl.innerHTML = '';

            if (refunds.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state" style="padding:32px;">
                        <p>目前沒有待處理的退款申請</p>
                    </div>`;
                return;
            }

            refunds.forEach(req => {
                const item = document.createElement('div');
                item.className = 'library-item';

                const refundId  = req.id || req.refund_id;
                const username  = req.username || (req.user && req.user.username) || '買家';
                const noteTitle = req.note_title || (req.note && req.note.title) || req.title || '';
                const price     = Number(req.amount || req.price || 0);
                const reason    = req.reason || req.description || '未填寫';

                item.innerHTML = `
                    <div class="library-item-info">
                        <h3>申請 #${refundId} — ${escapeHtml(noteTitle)}</h3>
                        <p>申請人：${escapeHtml(username)} &nbsp;|&nbsp; 金額：NT$ ${price.toLocaleString()} &nbsp;|&nbsp; 理由：${escapeHtml(reason)}</p>
                    </div>
                    <div class="library-item-actions" style="display:flex; flex-direction:column; gap:8px; align-items:flex-end;">
                        <div style="display:flex; gap:8px;">
                            <button class="button is-success is-light" onclick="processRefund(${refundId}, 'APPROVED')">核准退款</button>
                            <button class="button is-danger is-light" onclick="processRefund(${refundId}, 'REJECTED')">駁回</button>
                        </div>
                        <input type="text" id="reject-reason-${refundId}" class="input" placeholder="駁回理由 (選填)" style="width:200px; height:32px; font-size:12px;">
                    </div>
                `;
                listEl.appendChild(item);
            });
        }

        async function processRefund(refundId, status) {
            const label = status === 'APPROVED' ? '核准' : '駁回';
            if (!confirm(`確定要${label}此退款申請嗎？`)) return;
            
            let rejectReason = "";
            if (status === 'REJECTED') {
                const reasonInput = document.getElementById(`reject-reason-${refundId}`);
                if (reasonInput) rejectReason = reasonInput.value.trim();
            }

            try {
                // PUT /api/csr/refunds/{id}
                await apiProcessRefund(refundId, status, rejectReason);
                alert(`已${label}退款申請！`);
                await loadRefunds();
            } catch (err) {
                alert(`操作失敗：${err.message}`);
            }
        }
    </script>
</body>
</html>
