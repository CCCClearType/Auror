<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員後台 — VaporAuror</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

    <header id="global-header"></header>

    <main>
        <div class="dashboard-header">
            <h1 class="title">系統管理員後台</h1>
            <span class="tag role-badge admin">ADMIN</span>
        </div>

        <div class="dashboard-grid">
            <div class="box dashboard-panel">
                <h2 class="title is-4">全站帳號與權限管理</h2>
                <div class="library-list" id="users-list">
                    <p style="color:var(--text-muted);">載入中...</p>
                </div>
            </div>

            <div class="box dashboard-panel">
                <h2 class="title is-4">商店遊戲管理（強制下架）</h2>
                <div class="library-list" id="admin-games-list">
                    <p style="color:var(--text-muted);">載入中...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            if (getCurrentRole() !== 'ADMIN') {
                alert("存取被拒：您沒有管理員權限");
                window.location.href = '/';
                return;
            }
            await Promise.all([loadUsers(), loadGames()]);
        });

        // ─── 帳號列表 ──────────────────────────────────────────
        async function loadUsers() {
            try {
                // GET /api/admin/users
                const result = await apiGetUsers();
                const users  = Array.isArray(result) ? result : (result.data || result.users || []);
                renderUsers(users);
            } catch (err) {
                document.getElementById('users-list').innerHTML =
                    `<p style="color:var(--accent-red);">載入失敗：${err.message}</p>`;
            }
        }

        function renderUsers(users) {
            const list = document.getElementById('users-list');
            list.innerHTML = '';

            if (users.length === 0) {
                list.innerHTML = `<div class="empty-state"><p>暫無使用者資料</p></div>`;
                return;
            }

            users.forEach(user => {
                const item = document.createElement('div');
                item.className = 'library-item';

                const isDeleted    = user.permission === 'DELETED';
                const isBanned     = user.permission === 'DEACTIVE';
                
                let statusBadge = '';
                if (isDeleted) {
                    statusBadge = `<span class="tag status-badge" style="background-color:var(--bg-card); color:var(--text-muted); border:1px solid var(--border-color);">已刪除</span>`;
                } else if (isBanned) {
                    statusBadge = `<span class="tag status-badge status-banned">已停權</span>`;
                } else {
                    statusBadge = `<span class="tag status-badge status-active">正常</span>`;
                }

                const banText      = !isBanned ? "停權" : "解除停權";
                const banColor     = !isBanned ? "var(--accent-red)" : "var(--accent-yellow)";

                let actionHtml = '';
                if (isDeleted) {
                    actionHtml = `<button class="button is-light" disabled style="opacity: 0.5;">已永久刪除</button>`;
                } else {
                    actionHtml = `
                        <div class="select">
                            <select class="role-select" onchange="changeRole(${user.id}, this.value)">
                                <option value="USERS"     ${user.role==='USERS'     ? 'selected':''}>玩家 (User)</option>
                                <option value="DEVELOPER" ${user.role==='DEVELOPER' ? 'selected':''}>開發者 (Dev)</option>
                                <option value="CSR"       ${user.role==='CSR'       ? 'selected':''}>客服 (CSR)</option>
                                <option value="ADMIN"     ${user.role==='ADMIN'     ? 'selected':''}>管理員 (Admin)</option>
                            </select>
                        </div>
                        <button class="button is-light"
                                style="background-color:${banColor};color:#fff;border-color:${banColor};"
                                onclick="toggleSuspend(${user.id}, ${isBanned})">${banText}</button>
                        <button class="button is-danger is-light" onclick="deleteUser(${user.id})">永久刪除</button>
                    `;
                }

                item.innerHTML = `
                    <div class="library-item-info">
                        <h3>ID: ${user.id} — ${escapeHtml(user.username)}</h3>
                        <p>信箱：${escapeHtml(user.email || '')} &nbsp;|&nbsp; 狀態：${statusBadge}</p>
                    </div>
                    <div class="library-item-actions">
                        ${actionHtml}
                    </div>
                `;
                list.appendChild(item);
            });
        }

        async function changeRole(userId, newRole) {
            if (!confirm(`確定要將此帳號的權限更改為 [${newRole}] 嗎？`)) {
                await loadUsers(); // 取消時還原 select
                return;
            }
            try {
                // PUT /api/admin/users/{id}/role  { role }
                await apiChangeRole(userId, newRole);
                alert('權限變更成功！');
                await loadUsers();
            } catch (err) {
                alert(`變更失敗：${err.message}`);
                await loadUsers();
            }
        }

        async function toggleSuspend(userId, currentlySuspended) {
            const action = currentlySuspended ? '解除停權' : '停權';
            if (!confirm(`確定要對此帳號執行「${action}」嗎？`)) return;
            try {
                // PUT /api/admin/users/{id}/suspend
                await apiSuspendUser(userId);
                alert(`${action}成功！`);
                await loadUsers();
            } catch (err) {
                alert(`操作失敗：${err.message}`);
            }
        }

        async function deleteUser(userId) {
            if (!confirm("警告：此操作不可逆！確定要永久刪除此帳號嗎？")) return;
            try {
                // DELETE /api/admin/users/{id}
                await apiDeleteUser(userId);
                alert('帳號已永久移除。');
                await loadUsers();
            } catch (err) {
                alert(`刪除失敗：${err.message}`);
            }
        }

        // ─── 遊戲管理 ──────────────────────────────────────────
        async function loadGames() {
            try {
                // GET /api/games
                const result = await apiGetGames();
                const games  = Array.isArray(result) ? result : (result.data || result.games || []);
                renderGamesForAdmin(games);
            } catch (err) {
                document.getElementById('admin-games-list').innerHTML =
                    `<p style="color:var(--accent-red);">載入失敗：${err.message}</p>`;
            }
        }

        function renderGamesForAdmin(games) {
            const list = document.getElementById('admin-games-list');
            list.innerHTML = '';

            games.forEach(game => {
                const gameId = game.game_id || game.id;
                const item = document.createElement('div');
                item.className = 'library-item';
                const developer = game.developer_name || game.developer || (game.developer_user && game.developer_user.username) || '未知';
                const priceHtml = game.price === 0 ? "免費" : `NT$ ${game.price.toLocaleString()}`;

                item.innerHTML = `
                    <div class="library-item-info">
                        <h3>${escapeHtml(game.title)}</h3>
                        <p>開發者：${escapeHtml(developer)} &nbsp;|&nbsp; 價格：${priceHtml} &nbsp;|&nbsp;
                           <span class="tag status-badge status-active">正常販售中</span>
                        </p>
                    </div>
                    <div class="library-item-actions">
                        <button class="button is-danger is-light" onclick="adminTakeDown(${gameId})">強制下架</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        async function adminTakeDown(gameId) {
            if (!confirm("確定要以管理員身分強制下架此遊戲嗎？")) return;
            try {
                // DELETE /api/admin/games/{id}
                await apiAdminDeleteGame(gameId);
                alert('遊戲已強制下架！');
                await loadGames();
            } catch (err) {
                alert(`下架失敗：${err.message}`);
            }
        }
    </script>
</body>
</html>
