<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員後台 — AurorNote</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

    <header id="global-header"></header>

    <main>
        <div class="dashboard-header">
            <h1 class="title">系統管理員後台</h1>
            <span class="tag role-badge admin">ADMIN</span>
        </div>

        <div class="tabs is-boxed" style="margin-bottom: 1rem;">
            <ul>
                <li id="tab-users" class="is-active"><a onclick="switchTab('users')">全站帳號與權限管理</a></li>
                <li id="tab-notes"><a onclick="switchTab('notes')">商店筆記管理（強制下架）</a></li>
            </ul>
        </div>

        <div id="role-filters" style="margin-bottom: 1.5rem; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;">
            <span style="font-weight: bold; margin-right: 0.5rem; color: var(--text-color);">身分過濾：</span>
            <button class="button is-small is-info" id="filter-ALL" onclick="toggleRoleFilter('ALL')">ALL</button>
            <button class="button is-small is-light" id="filter-USERS" onclick="toggleRoleFilter('USERS')">USER</button>
            <button class="button is-small is-light" id="filter-SELLER" onclick="toggleRoleFilter('SELLER')">SELLER</button>
            <button class="button is-small is-light" id="filter-CSR" onclick="toggleRoleFilter('CSR')">CSR</button>
            <button class="button is-small is-light" id="filter-ADMIN" onclick="toggleRoleFilter('ADMIN')">ADMIN</button>
        </div>

        <div id="panel-users" class="dashboard-grid" style="grid-template-columns: 1fr;">
            <div class="box dashboard-panel">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                    <h2 class="title is-4" style="margin-bottom:0;">全站帳號與權限管理</h2>
                    <div class="select">
                        <select id="user-sort" onchange="applyUserSort()">
                            <option value="id_asc">註冊時間 (舊到新)</option>
                            <option value="id_desc">註冊時間 (新到舊)</option>
                            <option value="name_asc">帳號名稱 (A-Z)</option>
                            <option value="name_desc">帳號名稱 (Z-A)</option>
                        </select>
                    </div>
                </div>
                <div class="library-list" id="users-list">
                    <p style="color:var(--text-muted);">載入中...</p>
                </div>
            </div>
        </div>

        <div id="panel-notes" class="dashboard-grid" style="grid-template-columns: 1fr; display: none;">
            <div class="box dashboard-panel">
                <h2 class="title is-4">商店筆記管理（強制下架）</h2>
                <div class="library-list" id="admin-notes-list">
                    <p style="color:var(--text-muted);">載入中...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            if (getCurrentRole() !== 'ADMIN') {
                alert("存取被拒：您沒有管理員權限");
                window.location.href = '/';
                return;
            }
            await Promise.all([loadUsers(), loadNotes()]);
        });

        let allUsers = [];
        let activeRoles = ['ALL'];

        function toggleRoleFilter(role) {
            if (role === 'ALL') {
                activeRoles = ['ALL'];
            } else {
                // If ALL was selected, clear it
                if (activeRoles.includes('ALL')) {
                    activeRoles = [];
                }
                
                // Toggle the clicked role
                if (activeRoles.includes(role)) {
                    activeRoles = activeRoles.filter(r => r !== role);
                } else {
                    activeRoles.push(role);
                }
                
                // If nothing is selected, fallback to ALL
                if (activeRoles.length === 0) {
                    activeRoles = ['ALL'];
                }
            }
            
            // Update button styles
            ['ALL', 'USERS', 'SELLER', 'CSR', 'ADMIN'].forEach(r => {
                const btn = document.getElementById(`filter-${r}`);
                if (!btn) return;
                if (activeRoles.includes(r)) {
                    btn.classList.remove('is-light');
                    btn.classList.add('is-info');
                } else {
                    btn.classList.remove('is-info');
                    btn.classList.add('is-light');
                }
            });
            
            applyUserSort();
        }

        function switchTab(tabId) {
            document.getElementById('tab-users').classList.remove('is-active');
            document.getElementById('tab-notes').classList.remove('is-active');
            
            document.getElementById('panel-users').style.display = 'none';
            document.getElementById('panel-notes').style.display = 'none';
            
            document.getElementById('tab-' + tabId).classList.add('is-active');
            document.getElementById('panel-' + tabId).style.display = 'grid';
        }

        // ─── 帳號列表 ──────────────────────────────────────────
        async function loadUsers() {
            try {
                // GET /api/admin/users
                const result = await apiGetUsers();
                allUsers  = Array.isArray(result) ? result : (result.data || result.users || []);
                applyUserSort();
            } catch (err) {
                document.getElementById('users-list').innerHTML =
                    `<p style="color:var(--accent-red);">載入失敗：${err.message}</p>`;
            }
        }

        function applyUserSort() {
            const sortVal = document.getElementById('user-sort').value;
            
            // Filter by active roles
            let filtered = allUsers.filter(u => {
                if (activeRoles.includes('ALL')) return true;
                const r = u.role || 'USERS'; // default role
                return activeRoles.includes(r);
            });
            
            // Sort
            if (sortVal === 'id_desc') {
                filtered.sort((a, b) => b.id - a.id);
            } else if (sortVal === 'id_asc') {
                filtered.sort((a, b) => a.id - b.id);
            } else if (sortVal === 'name_asc') {
                filtered.sort((a, b) => (a.username || '').localeCompare(b.username || ''));
            } else if (sortVal === 'name_desc') {
                filtered.sort((a, b) => (b.username || '').localeCompare(a.username || ''));
            }
            
            renderUsers(filtered);
        }

        function renderUsers(users) {
            const list = document.getElementById('users-list');
            list.innerHTML = '';

            if (users.length === 0) {
                list.innerHTML = `<div class="empty-state"><p>暫無符合條件的使用者資料</p></div>`;
                return;
            }
            
            // Group by role
            const groups = {
                'ADMIN': [],
                'CSR': [],
                'SELLER': [],
                'USERS': [],
                'OTHER': []
            };
            
            users.forEach(user => {
                const r = user.role || 'USERS';
                if (groups[r]) groups[r].push(user);
                else groups['OTHER'].push(user);
            });
            
            // Render groups
            for (const [roleName, groupUsers] of Object.entries(groups)) {
                if (groupUsers.length === 0) continue;
                
                // Group Header
                const header = document.createElement('h3');
                header.className = 'title is-5';
                header.style.marginTop = '1.5rem';
                header.style.marginBottom = '0.75rem';
                header.style.padding = '0.5rem';
                header.style.background = 'var(--bg-card)';
                header.style.borderLeft = '4px solid var(--accent-blue)';
                header.style.color = 'var(--text-color)';
                header.innerHTML = `角色：${roleName} <span class="tag is-dark" style="margin-left: 0.5rem;">${groupUsers.length} 人</span>`;
                list.appendChild(header);
                
                // Group Items
                groupUsers.forEach(user => {
                    const item = document.createElement('div');
                    item.className = 'library-item';

                const isDeleted    = user.permission === 'DELETED';
                const isBanned     = user.permission === 'DEACTIVE';
                
                let statusBadge = '';
                if (isDeleted) {
                    statusBadge = `<span class="tag status-badge" style="background-color:var(--bg-card); color:var(--text-muted); border:1px solid var(--border-color);">已刪除</span>`;
                } else if (isBanned) {
                    statusBadge = `<span class="tag status-badge status-banned">已停權</span>`;
                } else {
                    statusBadge = `<span class="tag status-badge status-active">正常</span>`;
                }

                const banText      = !isBanned ? "停權" : "解除停權";
                const banColor     = !isBanned ? "var(--accent-red)" : "var(--accent-yellow)";

                let actionHtml = '';
                if (isDeleted) {
                    actionHtml = `<button class="button is-light" disabled style="opacity: 0.5; width: 330px;">已永久刪除</button>`;
                } else {
                    actionHtml = `
                        <div class="select" style="width: 150px;">
                            <select class="role-select" style="width: 100%;" onchange="changeRole(${user.id}, this.value)">
                                <option value="USERS"     ${user.role==='USERS'     ? 'selected':''}>買家 (User)</option>
                                <option value="SELLER" ${user.role==='SELLER' ? 'selected':''}>賣家 (SELLER)</option>
                                <option value="CSR"       ${user.role==='CSR'       ? 'selected':''}>客服 (CSR)</option>
                                <option value="ADMIN"     ${user.role==='ADMIN'     ? 'selected':''}>管理員 (Admin)</option>
                            </select>
                        </div>
                        <button class="button is-light"
                                style="background-color:${banColor};color:#fff;border-color:${banColor}; width: 100px;"
                                onclick="toggleSuspend(${user.id}, ${isBanned})">${banText}</button>
                        <button class="button is-danger is-light" style="width: 100px;" onclick="deleteUser(${user.id})">永久刪除</button>
                    `;
                }

                item.innerHTML = `
                    <div class="library-item-info">
                        <h3>ID: ${user.id} — ${escapeHtml(user.username)}</h3>
                        <p>信箱：${escapeHtml(user.email || '')} &nbsp;|&nbsp; 狀態：${statusBadge}</p>
                    </div>
                    <div class="library-item-actions">
                        ${actionHtml}
                    </div>
                `;
                list.appendChild(item);
                });
            }
        }

        async function changeRole(userId, newRole) {
            if (!confirm(`確定要將此帳號的權限更改為 [${newRole}] 嗎？`)) {
                await loadUsers(); // 取消時還原 select
                return;
            }
            try {
                // PUT /api/admin/users/{id}/role  { role }
                await apiChangeRole(userId, newRole);
                alert('權限變更成功！');
                await loadUsers();
            } catch (err) {
                alert(`變更失敗：${err.message}`);
                await loadUsers();
            }
        }

        async function toggleSuspend(userId, currentlySuspended) {
            const action = currentlySuspended ? '解除停權' : '停權';
            if (!confirm(`確定要對此帳號執行「${action}」嗎？`)) return;
            try {
                // PUT /api/admin/users/{id}/suspend
                await apiSuspendUser(userId);
                alert(`${action}成功！`);
                await loadUsers();
            } catch (err) {
                alert(`操作失敗：${err.message}`);
            }
        }

        async function deleteUser(userId) {
            if (!confirm("警告：此操作不可逆！確定要永久刪除此帳號嗎？")) return;
            try {
                // DELETE /api/admin/users/{id}
                await apiDeleteUser(userId);
                alert('帳號已永久移除。');
                await loadUsers();
            } catch (err) {
                alert(`刪除失敗：${err.message}`);
            }
        }

        // ─── 筆記管理 ──────────────────────────────────────────
        async function loadNotes() {
            try {
                // GET /api/notes
                const result = await apiGetNotes();
                const notes  = Array.isArray(result) ? result : (result.data || result.notes || []);
                renderNotesForAdmin(notes);
            } catch (err) {
                document.getElementById('admin-notes-list').innerHTML =
                    `<p style="color:var(--accent-red);">載入失敗：${err.message}</p>`;
            }
        }

        function renderNotesForAdmin(notes) {
            const list = document.getElementById('admin-notes-list');
            list.innerHTML = '';

            notes.forEach(note => {
                const noteId = note.note_id || note.id;
                const item = document.createElement('div');
                item.className = 'library-item';
                const seller = note.seller_name || note.seller || (note.seller_user && note.seller_user.username) || '未知';
                const priceHtml = note.price === 0 ? "免費" : `NT$ ${note.price.toLocaleString()}`;

                item.innerHTML = `
                    <div class="library-item-info">
                        <h3>${escapeHtml(note.title)}</h3>
                        <p>賣家：${escapeHtml(seller)} &nbsp;|&nbsp; 價格：${priceHtml} &nbsp;|&nbsp;
                           <span class="tag status-badge status-active">正常販售中</span>
                        </p>
                    </div>
                    <div class="library-item-actions">
                        <button class="button is-danger is-light" onclick="adminTakeDown(${noteId})">強制下架</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        async function adminTakeDown(noteId) {
            if (!confirm("確定要以管理員身分強制下架此筆記嗎？")) return;
            try {
                // DELETE /api/admin/notes/{id}
                await apiAdminDeleteNote(noteId);
                alert('筆記已強制下架！');
                await loadNotes();
            } catch (err) {
                alert(`下架失敗：${err.message}`);
            }
        }
    </script>
</body>
</html>
