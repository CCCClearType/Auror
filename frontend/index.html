<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AurorNote — 筆記商城</title>
    <meta name="description" content="探索海量筆記，享受最優惠的價格。AurorNote 是你的終極筆記平台。">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

    <header id="global-header"></header>

    <main>
        <section class="section store-hero">
            <div class="featured-note">
                <div class="featured-content">
                    <p class="tag is-rounded is-info is-light">AurorNote Storefront</p>
                    <h1 class="title">探索你的下一款最愛筆記</h1>
                    <p class="subtitle">超過千款筆記，總有一款等著你</p>
                    <form class="search-bar field has-addons" id="search-form">
                        <div class="control is-expanded">
                            <input class="input is-medium" type="text" id="search-input" placeholder="搜尋筆記名稱、類型、賣家...">
                        </div>
                        <div class="control">
                            <button type="submit" class="button is-primary is-medium">搜尋</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>

        <section class="store-layout">
            <aside class="store-sidebar">
                <div class="box sidebar-block">
                    <h2 class="title is-6">Tag 瀏覽</h2>
                    <ul class="category-list" id="tag-list">
                        <li><a href="/pages/store/search.html">所有筆記</a></li>
                    </ul>
                </div>
                <div class="box sidebar-block">
                    <h2 class="title is-6">價格篩選</h2>
                    <ul class="filter-list">
                        <li><a href="/pages/store/search.html?min_price=0&max_price=0">免費下載</a></li>
                        <li><a href="/pages/store/search.html?max_price=50">NT$ 0 - 50</a></li>
                        <li><a href="/pages/store/search.html?min_price=50&max_price=100">NT$ 50 - 100</a></li>
                        <li><a href="/pages/store/search.html?min_price=100&max_price=150">NT$ 100 - 150</a></li>
                        <li><a href="/pages/store/search.html?min_price=150&max_price=200">NT$ 150 - 200</a></li>
                        <li><a href="/pages/store/search.html?min_price=200&max_price=250">NT$ 200 - 250</a></li>
                        <li><a href="/pages/store/search.html?min_price=250&max_price=300">NT$ 250 - 300</a></li>
                        <li><a href="/pages/store/search.html?min_price=300">NT$ 300+</a></li>
                    </ul>
                </div>
            </aside>
            <div class="store-main">
                <div class="section-header">
                    <h2 class="section-title">熱門推薦</h2>
                    <div class="sort-options" style="display: flex; align-items: center; gap: 1rem;">
                        <div id="hide-owned-wrapper" style="display: none; align-items: center; gap: 0.6rem;">
                            <span class="has-text-grey-light is-size-7" style="font-weight: 700;">隱藏已購買</span>
                            <div class="vp-switch" id="hide-owned-toggle">
                                <div class="vp-option vp-on"><span>ON</span></div>
                                <div class="vp-option vp-off"><span>OFF</span></div>
                            </div>
                        </div>
                        <div class="select is-rounded">
                            <select id="sort-select" class="store-select">
                                <option value="price_asc">價格由低到高</option>
                                <option value="price_desc">價格由高到低</option>
                            </select>
                        </div>
                        <div class="select is-rounded">
                            <select id="filter-group" class="store-select">
                                <option value="">不分群</option>
                                <option value="SEMESTER">依學期</option>
                                <option value="SUBJECT">依科目</option>
                                <option value="DEPARTMENT">依系所</option>
                                <option value="COURSE_TYPE">依屬性</option>
                                <option value="TEACHER">依老師</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="note-list-container" id="note-list">
                    <p class="has-text-centered p-6">載入中...</p>
                </div>
            </div>
        </section>
    </main>

    <script src="/assets/js/api.js?v=2"></script>
    <script src="/assets/js/main.js?v=2"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const sortSelect = document.getElementById('sort-select');
            const hideOwnedWrapper = document.getElementById('hide-owned-wrapper');
            const hideOwnedToggle = document.getElementById('hide-owned-toggle');

            if (localStorage.getItem('token')) {
                hideOwnedWrapper.style.display = 'flex';
            }

            hideOwnedToggle.addEventListener('click', () => {
                hideOwnedToggle.classList.toggle('is-active');
                loadHomeNotes();
            });

            sortSelect.addEventListener('change', () => loadHomeNotes());
            document.getElementById('filter-group').addEventListener('change', () => loadHomeNotes());

            loadHomeTags();
            renderNotes(null);
            await loadHomeNotes();
        });

        async function loadHomeNotes() {
            try {
                const query = { sort: document.getElementById('sort-select').value };
                const hideOwnedToggle = document.getElementById('hide-owned-toggle');
                if (hideOwnedToggle && hideOwnedToggle.classList.contains('is-active')) {
                    query.hide_owned = 'true';
                }
                const notes = await apiGetNotes(query);
                renderNotes(Array.isArray(notes) ? notes : (notes.data || notes.notes || []));
            } catch (err) {
                document.getElementById('note-list').innerHTML =
                    `<p style="color:var(--accent-red);text-align:center;padding:40px;">無法載入筆記列表：${err.message}</p>`;
            }
        }

        async function loadHomeTags() {
            try {
                const result = await apiGetTags();
                const tags = Array.isArray(result) ? result : (result.data || []);
                const list = document.getElementById('tag-list');
                list.innerHTML = `<li><a href="/pages/store/search.html">所有筆記</a></li>`;
                
                const grouped = {
                    SEMESTER: { label: '學年度 / 學期', tags: [] },
                    DEPARTMENT: { label: '開課系所', tags: [] },
                    COURSE_TYPE: { label: '課程屬性', tags: [] },
                    SUBJECT: { label: '科目', tags: [] },
                    TEACHER: { label: '老師', tags: [] },
                    GENERAL: { label: '一般標籤', tags: [] }
                };

                tags.forEach(tag => {
                    const type = tag.tag_type || 'GENERAL';
                    if (grouped[type]) {
                        grouped[type].tags.push(tag);
                    } else {
                        grouped['GENERAL'].tags.push(tag);
                    }
                });

                const queryParamMap = {
                    SEMESTER: 'semester',
                    DEPARTMENT: 'department',
                    COURSE_TYPE: 'course_type',
                    SUBJECT: 'subject',
                    TEACHER: 'teacher',
                    GENERAL: 'tag'
                };

                for (const [type, group] of Object.entries(grouped)) {
                    if (group.tags.length > 0) {
                        const header = document.createElement('li');
                        header.innerHTML = `<span style="display:block; margin-top:16px; margin-bottom:6px; font-size:12px; font-weight:bold; color:#66c0f4; text-transform:uppercase; letter-spacing:1px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px;">${group.label}</span>`;
                        list.appendChild(header);

                        group.tags.forEach(tag => {
                            const name = tag.tag_name || tag.name;
                            const item = document.createElement('li');
                            const param = queryParamMap[type];
                            item.innerHTML = `<a href="/pages/store/search.html?${param}=${encodeURIComponent(name)}" class="sidebar-tag type-${type}" style="padding-left: 8px;">${escapeHtml(name)}</a>`;
                            list.appendChild(item);
                        });
                    }
                }
            } catch (_) {}
        }
    </script>
</body>
</html>
