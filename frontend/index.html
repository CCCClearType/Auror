<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AurorVapor — 遊戲商店</title>
    <meta name="description" content="探索海量遊戲，享受最優惠的價格。AurorVapor 是你的終極遊戲平台。">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

    <header id="global-header"></header>

    <main>
        <section class="section store-hero">
            <div class="featured-game">
                <div class="featured-content">
                    <p class="tag is-rounded is-info is-light">AurorVapor Storefront</p>
                    <h1 class="title">探索你的下一款最愛遊戲</h1>
                    <p class="subtitle">超過千款遊戲，總有一款等著你</p>
                    <form class="search-bar field has-addons" id="search-form">
                        <div class="control is-expanded">
                            <input class="input is-medium" type="text" id="search-input" placeholder="搜尋遊戲名稱、類型、開發者...">
                        </div>
                        <div class="control">
                            <button type="submit" class="button is-primary is-medium">搜尋</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>

        <section class="store-layout">
            <aside class="store-sidebar">
                <div class="box sidebar-block">
                    <h2 class="title is-6">Tag 瀏覽</h2>
                    <ul class="category-list" id="tag-list">
                        <li><a href="/pages/store/search.html">所有遊戲</a></li>
                    </ul>
                </div>
                <div class="box sidebar-block">
                    <h2 class="title is-6">價格篩選</h2>
                    <ul class="filter-list">
                        <li><a href="/pages/store/search.html?min_price=0&max_price=0">免費遊玩</a></li>
                        <li><a href="/pages/store/search.html?max_price=300">NT$ 300 以下</a></li>
                        <li><a href="/pages/store/search.html?min_price=301&max_price=900">NT$ 301 - 900</a></li>
                    </ul>
                </div>
            </aside>
            <div class="store-main">
                <div class="section-header">
                    <h2 class="section-title">熱門推薦</h2>
                    <div class="sort-options" style="display: flex; align-items: center; gap: 1rem;">
                        <div id="hide-owned-wrapper" style="display: none; align-items: center; gap: 0.6rem;">
                            <span class="has-text-grey-light is-size-7" style="font-weight: 700;">隱藏已購買</span>
                            <div class="vp-switch" id="hide-owned-toggle">
                                <div class="vp-option vp-on"><span>ON</span></div>
                                <div class="vp-option vp-off"><span>OFF</span></div>
                            </div>
                        </div>
                        <div class="select is-rounded">
                            <select id="sort-select" class="store-select">
                                <option value="price_asc">價格由低到高</option>
                                <option value="price_desc">價格由高到低</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="game-list-container" id="game-list">
                    <p class="has-text-centered p-6">載入中...</p>
                </div>
            </div>
        </section>
    </main>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const sortSelect = document.getElementById('sort-select');
            const hideOwnedWrapper = document.getElementById('hide-owned-wrapper');
            const hideOwnedToggle = document.getElementById('hide-owned-toggle');

            if (localStorage.getItem('token')) {
                hideOwnedWrapper.style.display = 'flex';
            }

            hideOwnedToggle.addEventListener('click', () => {
                hideOwnedToggle.classList.toggle('is-active');
                loadHomeGames();
            });

            sortSelect.addEventListener('change', () => loadHomeGames());

            loadHomeTags();
            renderGames(null);
            await loadHomeGames();
        });

        async function loadHomeGames() {
            try {
                const query = { sort: document.getElementById('sort-select').value };
                const hideOwnedToggle = document.getElementById('hide-owned-toggle');
                if (hideOwnedToggle && hideOwnedToggle.classList.contains('is-active')) {
                    query.hide_owned = 'true';
                }
                const games = await apiGetGames(query);
                renderGames(Array.isArray(games) ? games : (games.data || games.games || []));
            } catch (err) {
                document.getElementById('game-list').innerHTML =
                    `<p style="color:var(--accent-red);text-align:center;padding:40px;">無法載入遊戲列表：${err.message}</p>`;
            }
        }

        async function loadHomeTags() {
            try {
                const result = await apiGetTags();
                const tags = Array.isArray(result) ? result : (result.data || []);
                const list = document.getElementById('tag-list');
                tags.forEach(tag => {
                    const name = tag.tag_name || tag.name;
                    if (!name) return;
                    const item = document.createElement('li');
                    item.innerHTML = `<a href="/pages/store/search.html?tag=${encodeURIComponent(name)}">${escapeHtml(name)}</a>`;
                    list.appendChild(item);
                });
            } catch (_) {}
        }
    </script>
</body>
</html>
